// ─── CRM ─────────────────────────────────────────────────────────────────────
function CRMSection({ profile }) {
  const [leads,setLeads]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const [nudge,setNudge]=useState(null);
  const [nudgeLoad,setNudgeLoad]=useState(null);
  const [form,setForm]=useState({name:"",contact:"",value:"",status:"Lead",source:"",notes:""});
  const STATUSES=["Lead","Contacted","Proposal Sent","Negotiating","Closed Won","Closed Lost"];
  const SC={Lead:"#F4C430",Contacted:"#FF6B35","Proposal Sent":"#A78BFA",Negotiating:"#58a6ff","Closed Won":"#00C897","Closed Lost":"rgba(255,255,255,0.2)"};
  useEffect(()=>{ sg("fc_crm").then(d=>{if(d)setLeads(d);}); },[]);
  const save=l=>{setLeads(l);ss("fc_crm",l);};
  const add=()=>{ if(!form.name)return; save([...leads,{...form,id:Date.now(),value:Number(form.value)||0,lastContact:new Date().toISOString().split("T")[0],createdAt:new Date().toISOString()}]); setForm({name:"",contact:"",value:"",status:"Lead",source:"",notes:""}); setShowForm(false); };
  const days=(d)=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):999;
  const stale=leads.filter(l=>l.status!=="Closed Won"&&l.status!=="Closed Lost"&&days(l.lastContact)>7);
  const getNudge=async(lead)=>{
    setNudgeLoad(lead.id);
    try {
      const res=await callClaude("You are a sales coach. Write specific, natural follow-up advice. Be brief and direct.",[{role:"user",content:`Follow-up for: ${lead.name}, Status:${lead.status}, Days since contact:${days(lead.lastContact)}, Value:$${lead.value}, Notes:${lead.notes}\nBusiness:${profile?.businessName||profile?.ideaDescription} (${profile?.industry}) in ${profile?.city}, ${SEASON}\n\nGive:\n1. Exact opening message to send NOW (under 3 sentences, natural)\n2. Best follow-up timing if no response\n3. One specific angle based on their status and season`}]);
      setNudge({leadId:lead.id,content:res});
    } catch { setNudge({leadId:lead.id,content:"Could not generate. Try again."}); }
    setNudgeLoad(null);
  };
  const totalV=leads.filter(l=>l.status!=="Closed Lost").reduce((a,l)=>a+Number(l.value||0),0);
  const closedV=leads.filter(l=>l.status==="Closed Won").reduce((a,l)=>a+Number(l.value||0),0);
  return (
    <div style={{padding:"22px 18px 40px",maxWidth:860,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div><div style={{fontSize:10,letterSpacing:3,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",marginBottom:4}}>Deal Intelligence</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:900,color:"#fff"}}>Client & Lead CRM</div></div>
        <Btn onClick={()=>setShowForm(f=>!f)} color="#A78BFA" style={{fontSize:12,padding:"9px 16px"}}>{showForm?"Cancel":"+ Add Lead"}</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
        <StatBox label="Pipeline Value" value={`$${totalV.toLocaleString()}`} color="#F4C430" icon="💼"/>
        <StatBox label="Closed Won"     value={`$${closedV.toLocaleString()}`} color="#00C897" icon="🏆"/>
        <StatBox label="Needs Follow-up" value={stale.length} color={stale.length>0?"#FF6B35":"#00C897"} icon="⏰"/>
      </div>
      {stale.length>0&&<div style={{padding:"12px 16px",borderRadius:12,background:"rgba(255,107,53,0.07)",border:"1px solid rgba(255,107,53,0.2)",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:16}}>⚠️</div>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#FF6B35"}}>{stale.length} lead{stale.length>1?"s":""} not contacted in 7+ days</div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:1}}>{stale.map(l=>l.name).join(", ")}</div></div>
        <button onClick={()=>getNudge(stale[0])} disabled={nudgeLoad===stale[0]?.id} style={{padding:"6px 12px",borderRadius:8,background:"rgba(255,107,53,0.12)",border:"1px solid rgba(255,107,53,0.25)",color:"#FF6B35",cursor:"pointer",fontSize:11,fontWeight:600,flexShrink:0}}>{nudgeLoad===stale[0]?.id?"...":"Get Script →"}</button>
      </div>}
      {showForm&&<div style={{background:"rgba(167,139,250,0.05)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:14,padding:"18px",marginBottom:16,animation:"fcu .3s ease"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Name / Company" style={{...SI,gridColumn:"1/-1"}}/>
          <input value={form.contact} onChange={e=>setForm(f=>({...f,contact:e.target.value}))} placeholder="Email or Phone" style={SI}/>

// Copy to clipboard utility
function CopyBtn({ text, label="Copy" }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    if (!text) return;
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(()=>setCopied(false), 2000); }).catch(()=>{});
    } else {
      // Fallback for browsers without clipboard API
      const el = document.createElement("textarea");
      el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
      document.body.appendChild(el); el.select();
      try { document.execCommand("copy"); setCopied(true); setTimeout(()=>setCopied(false), 2000); } catch {}
      document.body.removeChild(el);
    }
  };
  return (
    <button onClick={copy} style={{ padding:"5px 11px", borderRadius:7, cursor:"pointer", border:"1px solid rgba(255,255,255,0.12)", background:copied?"rgba(0,200,151,0.12)":"rgba(255,255,255,0.04)", color:copied?"#00C897":"rgba(255,255,255,0.5)", fontSize:11, fontWeight:600, transition:"all .2s", flexShrink:0 }}>
      {copied ? "✓ Copied!" : label}
    </button>
  );
}

// ─── FOLLOW-UP ENGINE ─────────────────────────────────────────────────────────
function FollowUpEngine({ profile }) {
  const [leads,    setLeads]    = useState([]);
  const [showAdd,  setShowAdd]  = useState(false);
  const [genLoad,  setGenLoad]  = useState(null);
  const [sequences,setSequences]= useState({});
  const [form,     setForm]     = useState({ clientName:"", service:"", estimateAmt:"", date:new Date().toISOString().split("T")[0], notes:"" });

  const biz   = profile?.businessName || profile?.ideaDescription || "the business";
  const city  = profile?.city || "your city";
  const ind   = profile?.industry?.split("(")?.[0]?.trim() || "service";

  useEffect(()=>{
    sg("fc_followups").then(d=>{ if(d) setLeads(d); });
    sg("fc_followup_seqs").then(d=>{ if(d) setSequences(d); });
  },[]);

  const saveLeads = l => { setLeads(l); ss("fc_followups", l); };
  const saveSeqs  = s => { setSequences(s); ss("fc_followup_seqs", s); };

  const addLead = () => {
    if (!form.clientName) return;
    const lead = { ...form, id:Date.now(), status:"Pending", createdAt:new Date().toISOString(), estimateAmt:Number(form.estimateAmt)||0 };
    const updated = [...leads, lead];
    saveLeads(updated);
    setForm({ clientName:"", service:"", estimateAmt:"", date:new Date().toISOString().split("T")[0], notes:"" });
    setShowAdd(false);
    // Auto-generate sequence
    generateSequence(lead, updated);
  };

  const generateSequence = async (lead, currentLeads) => {
    setGenLoad(lead.id);
    try {
      const result = await callClaudeJSON(
        "You write natural, persuasive follow-up messages for service businesses. Sound human — not salesy, not corporate. Output ONLY valid JSON.",
        `Generate a follow-up sequence for this estimate:
Business: ${biz} (${ind}) in ${city}
Client: ${lead.clientName}
Service: ${lead.service || ind + " service"}
Estimate amount: ${lead.estimateAmt ? "$" + lead.estimateAmt.toLocaleString() : "not specified"}
Estimate date: ${lead.date}
Notes: ${lead.notes || "none"}
Season: ${SEASON} ${YEAR}
Owner first name: ${profile?.ownerName?.split(" ")?.[0] || ""}

Write 3 follow-up messages that sound like they come from the owner personally — warm, local, not pushy.

Return JSON:
{
  "day3": {
    "subject": "Text/email subject line",
    "message": "The full message to send on day 3 after the estimate. 3-4 sentences max. Reference the specific service, their name, and a natural follow-up angle. Include a soft CTA.",
    "channel": "text",
    "tip": "One tip on how to send this for best response rate"
  },
  "day7": {
    "subject": "Subject line",
    "message": "Day 7 message — add a gentle urgency or value-add. Maybe mention a seasonal reason to book now, a limited availability angle, or a small sweetener. Still warm and human. 3-4 sentences.",
    "channel": "text",
    "tip": "Sending tip"
  },
  "day14": {
    "subject": "Subject line",
    "message": "Day 14 final message — the last follow-up. Give them an easy out while keeping the door open. Very short — 2-3 sentences. A question works well here.",
    "channel": "text",
    "tip": "Sending tip"
  }
}`
      );
      if (result) {
        const updated = { ...sequences, [lead.id]:result };
        saveSeqs(updated);
      }
    } catch(e) { console.error(e); }
    setGenLoad(null);
  };

  const getDaysSince = (dateStr) => Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
  const getNextFollowUp = (lead) => {
    const days = getDaysSince(lead.date);
    if (days < 3)  return { label:"Follow up in " + (3-days) + " day" + (3-days!==1?"s":""), urgency:"low" };
    if (days < 7)  return { label:"Day 3 follow-up due now", urgency:"high" };
    if (days < 14) return { label:"Day 7 follow-up overdue by " + (days-7) + "d", urgency:"critical" };
    return { label:"Final follow-up overdue — last chance", urgency:"critical" };
  };

  const URGENCY_COLORS = { low:"rgba(255,255,255,0.3)", high:"#F4C430", critical:"#FF6B35" };

  return (
    <div style={{ padding:"22px 18px 60px", maxWidth:860, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
        <GSectionTitle
          label="Autonomous Growth · Follow-Up Engine"
          title="Estimate Follow-Ups"
          sub="Add an estimate and get a 3-message follow-up sequence generated instantly. Never lose a job to silence again."
        />
        <GPrimaryBtn onClick={()=>setShowAdd(f=>!f)} color="#00C897" style={{ flexShrink:0 }}>{showAdd?"Cancel":"+ Log Estimate"}</GPrimaryBtn>
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:18 }}>
        {[
          { label:"Open Estimates",  value:leads.filter(l=>l.status==="Pending").length,    color:"#F4C430" },
          { label:"Needs Follow-Up", value:leads.filter(l=>l.status==="Pending"&&getDaysSince(l.date)>=3).length, color:"#FF6B35" },
          { label:"Pipeline Value",  value:`$${leads.filter(l=>l.status==="Pending").reduce((a,l)=>a+Number(l.estimateAmt||0),0).toLocaleString()}`, color:"#00C897" },
        ].map(s=>(
          <div key={s.label} className="card" style={{ textAlign:"center", borderColor:`${s.color}22` }}>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:24, fontWeight:800, color:s.color, marginBottom:3 }}>{s.value}</div>
            <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", letterSpacing:.5 }}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {/* Add form */}
      {showAdd && (
        <div className="card-green fade" style={{ marginBottom:18 }}>
          <GLabel color="rgba(0,200,151,0.8)">Log New Estimate</GLabel>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <input value={form.clientName} onChange={e=>setForm(f=>({...f,clientName:e.target.value}))} placeholder="Client name *" style={{...GSI,gridColumn:"1/-1"}}/>
            <input value={form.service}    onChange={e=>setForm(f=>({...f,service:e.target.value}))}    placeholder={`Service (e.g. Full house exterior painting)`} style={GSI}/>
            <input type="number" value={form.estimateAmt} onChange={e=>setForm(f=>({...f,estimateAmt:e.target.value}))} placeholder="Estimate amount ($)" style={GSI}/>
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={GSI}/>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (e.g. 3-bed detached, wants trim done too)" style={{...GSI,gridColumn:"1/-1"}}/>
          </div>
          <GPrimaryBtn onClick={addLead} color="#00C897" style={{ width:"100%" }}>
            Add Estimate + Auto-Generate Follow-Up Sequence →
          </GPrimaryBtn>
        </div>
      )}

      {/* Lead list */}
      {leads.length === 0 ? (
        <div className="card" style={{ textAlign:"center", padding:"40px" }}>
          <div style={{ fontSize:32, marginBottom:12 }}>📋</div>
          <div style={{ fontSize:14, color:"rgba(255,255,255,0.4)", fontWeight:300 }}>
            No estimates logged yet. Add your first one above and we'll generate the full follow-up sequence automatically.
          </div>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {leads.slice().reverse().map(lead => {
            const seq    = sequences[lead.id];
            const next   = getNextFollowUp(lead);
            const days   = getDaysSince(lead.date);
            const isWon  = lead.status === "Won";
            const isLost = lead.status === "Lost";
            return (
              <div key={lead.id} className="card fade" style={{ borderColor:isWon?"rgba(0,200,151,0.25)":isLost?"rgba(255,255,255,0.04)":next.urgency==="critical"?"rgba(255,107,53,0.3)":next.urgency==="high"?"rgba(244,196,48,0.25)":"rgba(255,255,255,0.08)" }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:14 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>{lead.clientName}</div>
                      {lead.estimateAmt>0 && <div style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:800, color:isWon?"#00C897":"#F4C430" }}>${Number(lead.estimateAmt).toLocaleString()}</div>}
                    </div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", marginBottom:4 }}>{lead.service} · Estimated {new Date(lead.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                    {lead.notes && <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", fontWeight:300 }}>{lead.notes}</div>}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:5, alignItems:"flex-end" }}>
                    {!isWon && !isLost && <div style={{ fontSize:10, color:URGENCY_COLORS[next.urgency], fontWeight:600, textAlign:"right" }}>{next.label}</div>}
                    <div style={{ display:"flex", gap:5 }}>
                      {["Pending","Won","Lost"].map(s=>(
                        <button key={s} onClick={()=>saveLeads(leads.map(l=>l.id===lead.id?{...l,status:s}:l))} style={{ padding:"3px 8px", borderRadius:6, cursor:"pointer", fontSize:9, fontWeight:600, transition:"all .2s", background:lead.status===s?(s==="Won"?"rgba(0,200,151,0.2)":s==="Lost"?"rgba(255,80,80,0.15)":"rgba(244,196,48,0.15)"):"rgba(255,255,255,0.04)", border:`1px solid ${lead.status===s?(s==="Won"?"rgba(0,200,151,0.4)":s==="Lost"?"rgba(255,80,80,0.3)":"rgba(244,196,48,0.4)"):"rgba(255,255,255,0.08)"}`, color:lead.status===s?(s==="Won"?"#00C897":s==="Lost"?"#FF4444":"#F4C430"):"rgba(255,255,255,0.35)" }}>{s}</button>
                      ))}
                      <button onClick={()=>saveLeads(leads.filter(l=>l.id!==lead.id))} style={{ padding:"3px 6px", borderRadius:6, cursor:"pointer", fontSize:10, background:"none", border:"none", color:"rgba(255,255,255,0.2)" }}>×</button>
                    </div>
                  </div>
                </div>

                {/* Sequence */}
                {genLoad===lead.id && (
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px", background:"rgba(255,255,255,0.02)", borderRadius:9 }}>
                    <GSpin color="#00C897" size={16}/>
                    <span style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>Writing your follow-up sequence...</span>
                  </div>
                )}
                {seq && !genLoad && !isLost && (
                  <div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)", letterSpacing:1, marginBottom:8 }}>FOLLOW-UP SEQUENCE</div>
                    {[
                      { key:"day3",  label:"Day 3",  color:"#F4C430", due:days>=3 },
                      { key:"day7",  label:"Day 7",  color:"#FF6B35", due:days>=7 },
                      { key:"day14", label:"Day 14", color:"#F472B6", due:days>=14 },
                    ].map(({ key, label, color, due }) => (
                      <div key={key} style={{ marginBottom:8, border:`1px solid ${due?""+color+"33":"rgba(255,255,255,0.06)"}`, borderRadius:10, overflow:"hidden" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 12px", background:due?`${color}08`:"rgba(255,255,255,0.02)" }}>
                          <div style={{ width:32, fontSize:10, fontWeight:700, color:due?color:"rgba(255,255,255,0.3)", flexShrink:0 }}>{label}</div>
                          <div style={{ flex:1, fontSize:11, color:due?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.3)", fontStyle:due?"normal":"italic" }}>
                            {due ? seq[key]?.message?.slice(0,80)+"..." : "Not yet — send on " + label.toLowerCase()}
                          </div>
                          {due && <CopyBtn text={seq[key]?.message}/>}
                        </div>
                        {due && (
                          <div style={{ padding:"9px 12px", background:"rgba(0,0,0,0.2)", borderTop:`1px solid ${color}18` }}>
                            <div style={{ fontSize:13, color:"rgba(255,255,255,0.75)", lineHeight:1.7, marginBottom:6 }}>{seq[key]?.message}</div>
                            <div style={{ fontSize:10, color:color }}>💡 {seq[key]?.tip}</div>
                          </div>
                        )}
                      </div>
                    ))}
                    <button onClick={()=>generateSequence(lead, leads)} style={{ fontSize:11, color:"rgba(255,255,255,0.25)", background:"none", border:"none", cursor:"pointer", marginTop:4 }}>↻ Regenerate sequence</button>
                  </div>
                )}
                {!seq && !genLoad && !isLost && (
                  <button onClick={()=>generateSequence(lead, leads)} style={{ fontSize:12, color:"#00C897", background:"rgba(0,200,151,0.06)", border:"1px solid rgba(0,200,151,0.2)", borderRadius:8, padding:"7px 14px", cursor:"pointer", width:"100%" }}>
                    ✨ Generate Follow-Up Sequence
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MISSED CALL RECOVERY ────────────────────────────────────────────────────
function MissedCallRecovery({ profile }) {
  const [calls,    setCalls]    = useState([]);
  const [showAdd,  setShowAdd]  = useState(false);
  const [genLoad,  setGenLoad]  = useState(null);
  const [responses,setResponses]= useState({});
  const [form,     setForm]     = useState({ callerName:"", number:"", timeAgo:"Just now", context:"" });

  const biz  = profile?.businessName || profile?.ideaDescription || "the business";
  const city = profile?.city || "your city";
  const ownerName = profile?.ownerName?.split(" ")?.[0] || "";

  useEffect(()=>{
    sg("fc_missed_calls").then(d=>{ if(d) setCalls(d); });
    sg("fc_missed_responses").then(d=>{ if(d) setResponses(d); });
  },[]);

  const saveCalls = c => { setCalls(c); ss("fc_missed_calls", c); };
  const saveResps = r => { setResponses(r); ss("fc_missed_responses", r); };

  const TIME_AGO_OPTIONS = ["Just now","5 minutes ago","15 minutes ago","30 minutes ago","1 hour ago","A few hours ago","This morning","Yesterday"];

  const logCall = () => {
    const call = { ...form, id:Date.now(), createdAt:new Date().toISOString(), responded:false };
    const updated = [call, ...calls];
    saveCalls(updated);
    setForm({ callerName:"", number:"", timeAgo:"Just now", context:"" });
    setShowAdd(false);
    generateResponse(call);
  };

  const generateResponse = async (call) => {
    setGenLoad(call.id);
    try {
      const result = await callClaudeJSON(
        "You write perfect missed call text-back messages for service businesses. Sound like the owner — warm, local, not a robot. ONLY valid JSON.",
        `Generate missed call response for:
Business: ${biz} in ${city}
Owner first name: ${ownerName}
Caller: ${call.callerName || "Unknown caller"}
Time missed: ${call.timeAgo}
Context: ${call.context || "No additional context"}
Time of day: ${TIME_OF_DAY} (${HOUR}:00)
Season: ${SEASON}

Return JSON:
{
  "textBack": "The text message to send RIGHT NOW. Under 3 sentences. Warm, personal, mention the missed call, give them a way to respond or book. No emojis unless they feel natural. Sign with owner name.",
  "emailSubject": "Short email subject if they prefer email",
  "emailBody": "Email version — slightly longer, same tone, 4-5 sentences max.",
  "voicemail": "Script to leave as a voicemail if no text response in 30 min. Under 45 seconds when read aloud.",
  "followUpIn": "When to follow up if no response",
  "tip": "One insight on the best way to recover this lead based on the time and context"
}`
      );
      if (result) {
        const updated = { ...responses, [call.id]:result };
        saveResps(updated);
      }
    } catch(e) {}
    setGenLoad(null);
  };

  return (
    <div style={{ padding:"22px 18px 60px", maxWidth:860, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
        <GSectionTitle
          label="Autonomous Growth · Missed Calls"
          title="Missed Call Recovery"
          sub="Every missed call is a missed job. Log it and get the exact text to send back in under 5 minutes."
        />
        <GPrimaryBtn onClick={()=>setShowAdd(f=>!f)} color="#FF6B35" style={{ flexShrink:0 }}>{showAdd?"Cancel":"📞 Log Missed Call"}</GPrimaryBtn>
      </div>

      {/* The value prop */}
      {calls.length === 0 && !showAdd && (
        <div className="card-coral fade" style={{ textAlign:"center", padding:"36px 28px", marginBottom:18 }}>
          <div style={{ fontSize:44, marginBottom:14 }}>📵</div>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:20, fontWeight:800, color:"#fff", marginBottom:8 }}>
            A missed call is a missed job
          </div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", fontWeight:300, lineHeight:1.7, maxWidth:380, margin:"0 auto 20px" }}>
            Research shows 78% of customers go to the first business that responds. A text-back within 5 minutes recovers most missed calls. We write it for you instantly.
          </div>
          <GPrimaryBtn onClick={()=>setShowAdd(true)} color="#FF6B35" style={{ fontSize:14, padding:"13px 32px" }}>
            📞 Log Your First Missed Call
          </GPrimaryBtn>
        </div>
      )}

      {/* Add form */}
      {showAdd && (
        <div className="card-coral fade" style={{ marginBottom:18 }}>
          <GLabel color="rgba(255,107,53,0.8)">Log Missed Call</GLabel>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <input value={form.callerName} onChange={e=>setForm(f=>({...f,callerName:e.target.value}))} placeholder="Caller name (if known)" style={GSI}/>
            <input value={form.number}     onChange={e=>setForm(f=>({...f,number:e.target.value}))}     placeholder="Phone number" style={GSI}/>
          </div>
          <div style={{ marginBottom:10 }}>
            <GLabel>How long ago?</GLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {TIME_AGO_OPTIONS.map(t=>(
                <div key={t} onClick={()=>setForm(f=>({...f,timeAgo:t}))} style={{ padding:"6px 12px", borderRadius:18, cursor:"pointer", fontSize:11, transition:"all .15s", background:form.timeAgo===t?"rgba(255,107,53,0.14)":"rgba(255,255,255,0.03)", border:`1.5px solid ${form.timeAgo===t?"#FF6B35":"rgba(255,255,255,0.08)"}`, color:form.timeAgo===t?"#FF6B35":"rgba(255,255,255,0.5)" }}>{t}</div>
              ))}
            </div>
          </div>
          <input value={form.context} onChange={e=>setForm(f=>({...f,context:e.target.value}))} placeholder="Any context? (e.g. likely a quote request, saw my yard sign)" style={{...GSI,width:"100%",marginBottom:10}}/>
          <GPrimaryBtn onClick={logCall} color="#FF6B35" style={{ width:"100%" }}>
            Log + Generate Response Now →
          </GPrimaryBtn>
        </div>
      )}

      {/* Call list */}
      {calls.map(call => {
        const resp = responses[call.id];
        return (
          <div key={call.id} className="card fade" style={{ marginBottom:12, borderColor:call.responded?"rgba(0,200,151,0.2)":"rgba(255,107,53,0.2)" }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:resp?14:0 }}>
              <div style={{ width:38, height:38, borderRadius:10, background:call.responded?"rgba(0,200,151,0.12)":"rgba(255,107,53,0.12)", border:`1px solid ${call.responded?"rgba(0,200,151,0.25)":"rgba(255,107,53,0.25)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>
                {call.responded?"✓":"📵"}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:"#fff" }}>{call.callerName || "Unknown caller"}{call.number ? ` · ${call.number}` : ""}</div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:2 }}>Missed {call.timeAgo} · {new Date(call.createdAt).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
                {call.context && <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:2 }}>{call.context}</div>}
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={()=>saveCalls(calls.map(c=>c.id===call.id?{...c,responded:!c.responded}:c))} style={{ padding:"4px 10px", borderRadius:7, cursor:"pointer", fontSize:10, fontWeight:600, background:call.responded?"rgba(0,200,151,0.12)":"rgba(255,255,255,0.04)", border:`1px solid ${call.responded?"rgba(0,200,151,0.3)":"rgba(255,255,255,0.1)"}`, color:call.responded?"#00C897":"rgba(255,255,255,0.4)" }}>{call.responded?"✓ Responded":"Mark Responded"}</button>
                <button onClick={()=>saveCalls(calls.filter(c=>c.id!==call.id))} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:16 }}>×</button>
              </div>
            </div>

            {genLoad===call.id && (
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px", background:"rgba(255,255,255,0.02)", borderRadius:9 }}>
                <GSpin color="#FF6B35" size={16}/>
                <span style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>Writing your recovery message...</span>
              </div>
            )}

            {resp && !genLoad && (
              <div>
                <ContentBox title="📱 Text Message (send this now)" content={resp.textBack} color="#FF6B35" icon="📱" defaultOpen={true}/>
                <ContentBox title="📧 Email Version" content={`Subject: ${resp.emailSubject}\n\n${resp.emailBody}`} color="#A78BFA" icon="📧"/>
                <ContentBox title="📞 Voicemail Script (if no response in 30 min)" content={resp.voicemail} color="#F4C430" icon="📞"/>
                {resp.tip && (
                  <div style={{ padding:"10px 13px", background:"rgba(0,200,151,0.06)", borderRadius:9, border:"1px solid rgba(0,200,151,0.18)", marginTop:8, fontSize:12, color:"rgba(255,255,255,0.6)" }}>
                    💡 {resp.tip} · Follow up: {resp.followUpIn}
                  </div>
                )}
              </div>
            )}
            {!resp && !genLoad && (
              <button onClick={()=>generateResponse(call)} style={{ marginTop:8, fontSize:12, color:"#FF6B35", background:"rgba(255,107,53,0.06)", border:"1px solid rgba(255,107,53,0.2)", borderRadius:8, padding:"7px 14px", cursor:"pointer", width:"100%" }}>
                ✨ Generate Recovery Messages
              </button>
            )}
          </div>
        );
      })}
    </div>
  );
}

function WeeklyLeadPlan({ profile }) {
  const [plan,    setPlan]    = useState(null);
  const [loading, setLoading] = useState(false);
  const [done,    setDone]    = useState({});

  const biz   = profile?.businessName || profile?.ideaDescription || "the business";
  const ind   = profile?.industry?.split("(")?.[0]?.trim() || "service business";
  const city  = profile?.city || "your city";
  const cust  = profile?.targetCustomer || "local customers";
  const bud   = profile?.budget || "limited";

  useEffect(()=>{
    sg("fc_lead_plan").then(p=>{
      if(p){ const age=Date.now()-(p.generatedAt||0); if(age<7*24*3600*1000){ setPlan(p); } }
    });
    sg("fc_lead_done").then(d=>{ if(d) setDone(d); });
  },[]);

  const generate = async () => {
    setLoading(true);
    try {
      const result = await callClaudeJSON(
        "You are a lead generation expert for service businesses. Generate specific, actionable, immediately executable lead generation actions. Use web search for real local data. Output ONLY valid JSON.",
        `Generate a weekly lead generation plan for:
Business: ${biz}
Industry: ${ind}
Location: ${city}, ${profile?.country||""}
Target Customer: ${cust}
Budget: ${bud}
Season: ${SEASON} ${YEAR}
Today: ${DAY}, ${DATE}

Research the actual local market, Facebook groups in ${city}, local events, and seasonal opportunities.

Return JSON:
{
  "generatedAt": ${Date.now()},
  "weekOf": "${DATE}",
  "season": "${SEASON}",
  "theme": "This week's lead generation theme — one punchy sentence",
  "marketInsight": "One current market insight specific to ${ind} in ${city} this ${SEASON} (use web search)",
  "actions": [
    {
      "id": "a1",
      "priority": 1,
      "title": "Specific action title",
      "description": "Exactly what to do — step by step. Be specific. Include real platform names, real group names if applicable, real seasonal angles. This should be copy-paste ready.",
      "timeNeeded": "30 min",
      "expectedLeads": "2-4 leads",
      "category": "social|referral|google|door-to-door|networking|content|phone",
      "script": "The exact words to say or post — a real script or post ready to copy",
      "bestTimeToDoThis": "e.g. Tuesday morning, right after this generates"
    }
  ],
  "quickTexts": [
    {
      "title": "Referral ask text",
      "recipient": "Who to send this to",
      "message": "The exact text message to send to ask for referrals this week"
    },
    {
      "title": "Past client reactivation",
      "recipient": "Past customers",
      "message": "Exact text to send to past clients for seasonal follow-up"
    },
    {
      "title": "Partnership outreach",
      "recipient": "Related local business",
      "message": "Text to send to a complementary local business to set up referral partnership"
    }
  ],
  "facebookGroups": ["Real group name in ${city} 1", "Real group name 2", "Real group name 3"],
  "weeklyGoal": "Specific, measurable lead goal for this week",
  "successMetric": "How to know if this week worked"
}

Make the actions hyper-specific to ${ind} in ${city} in ${SEASON}. 5 actions total. At least one must be zero-budget.`,
        false,
        2000
      );
      if (result) { setPlan(result); ss("fc_lead_plan", result); }
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const toggleDone = (id) => {
    const updated = { ...done, [id]:!done[id] };
    setDone(updated); ss("fc_lead_done", updated);
  };

  const completedCount = plan?.actions?.filter(a=>done[a.id]).length || 0;
  const totalCount     = plan?.actions?.length || 0;

  const CAT_COLORS = { social:"#F472B6", referral:"#F4C430", google:"#4285F4", "door-to-door":"#FF6B35", networking:"#A78BFA", content:"#00C897", phone:"#58a6ff" };

  return (
    <div style={{ padding:"22px 18px 60px", maxWidth:900, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:22, flexWrap:"wrap", gap:12 }}>
        <GSectionTitle
          label="Autonomous Growth · Lead Generation"
          title="Weekly Lead Plan"
          sub={plan ? `Week of ${plan.weekOf} · ${plan.season} · ${city}` : `5 specific actions every Monday. Real scripts. Real platforms. Real leads.`}
        />
        <GPrimaryBtn onClick={generate} disabled={loading} color="#A78BFA" style={{ flexShrink:0 }}>
          {loading ? "Building plan..." : plan ? "↻ New Week" : "⚡ Generate This Week's Plan"}

            Researching {city} market · Finding real Facebook groups<br/>
            Writing actual scripts · Pulling seasonal opportunities

        </div>

      {!plan && !loading && (
        <div className="card-purple fade" style={{ textAlign:"center", padding:"40px 28px" }}>

      {plan && !loading && (
        <>
          {/* Market insight + goal */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:18 }}>
            <div className="card-purple" style={{ padding:"16px" }}>
              <GLabel color="rgba(167,139,250,0.8)">This Week's Theme</GLabel>

              <div style={{ flex:1, height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>

function OnboardingShell({ children, title, sub, step, totalSteps, canNext, onNext, onBack, nextLabel, locTag }) {

    <div style={{ minHeight:"100vh", background:"#060910", display:"flex", flexDirection:"column", fontFamily:"'DM Sans',sans-serif", position:"relative", overflow:"hidden" }}>

      <div style={{ position:"absolute", bottom:-100, left:-100, width:300, height:300, borderRadius:"50%", background:"radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%)", pointerEvents:"none" }}/>
      <div style={{ padding:"20px 20px 0", flexShrink:0, position:"relative", zIndex:1 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:900, background:"linear-gradient(90deg,#F4C430,#FF6B35)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Founder's Cabinet</div>
          {locTag && <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:20, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)" }}>📍 {locTag}</div>}
        </div>
        {step > 0 && (
          <div style={{ display:"flex", gap:5, marginBottom:20, justifyContent:"center" }}>
            {Array.from({length:totalSteps}).map((_,i) => (
              <div key={i} style={{ width:i < step ? 22 : 7, height:6, borderRadius:3, background:i < step ? "linear-gradient(90deg,#F4C430,#FF6B35)" : "rgba(255,255,255,0.1)", transition:"all .3s ease" }}/>
            ))}
          </div>
        )}
        {title && (
          <div style={{ marginBottom:20 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(22px,5vw,30px)", fontWeight:900, color:"#fff", lineHeight:1.15, marginBottom:6 }}>{title}</div>
            {sub && <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", fontWeight:300, lineHeight:1.6 }}>{sub}</div>}
          </div>
        )}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"0 20px 20px", position:"relative", zIndex:1 }}>{children}</div>
      {step > 0 && (
        <div style={{ padding:"12px 20px 28px", borderTop:"1px solid rgba(255,255,255,0.05)", flexShrink:0, display:"flex", gap:10, position:"relative", zIndex:1, background:"rgba(6,9,16,0.85)", backdropFilter:"blur(8px)" }}>
          <button onClick={onBack} style={{ width:52, padding:"13px", borderRadius:12, cursor:"pointer", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.09)", color:"rgba(255,255,255,0.4)", fontSize:18 }}>←</button>
          <button disabled={!canNext} onClick={onNext} style={{ flex:1, padding:"14px", borderRadius:12, cursor:canNext?"pointer":"not-allowed", background:canNext?"linear-gradient(135deg,#F4C430,#FF6B35)":"rgba(255,255,255,0.06)", border:"none", color:canNext?"#060910":"rgba(255,255,255,0.2)", fontSize:14, fontWeight:700, transition:"all .2s", boxShadow:canNext?"0 8px 24px rgba(244,196,48,0.25)":"none" }}>
            {nextLabel || (step === totalSteps ? "Open My War Room 🚀" : "Continue →")}
          </button>
        </div>
      )}
    </div>
  );
}

    <div onClick={onClick} style={{ display:"flex", alignItems:"center", gap:8, padding:"11px 14px", borderRadius:12, cursor:"pointer", transition:"all .2s", background:selected?`${color}14`:"rgba(255,255,255,0.03)", border:`1.5px solid ${selected?color:"rgba(255,255,255,0.08)"}`, userSelect:"none", boxShadow:selected?`0 4px 16px ${color}25`:"none" }}>
      <span style={{ fontSize:18, lineHeight:1 }}>{emoji}</span>
      <span style={{ fontSize:12, fontWeight:selected?600:400, color:selected?color:"rgba(255,255,255,0.65)" }}>{label}</span>
      {selected && <span style={{ marginLeft:"auto", color, fontSize:14 }}>✓</span>}
    </div>
  );
}

          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

        <div style={{ textAlign:"center", fontSize:11, color:"rgba(255,255,255,0.25)", lineHeight:1.7, marginTop:8 }}>
          Everything saved locally · Update anytime from Settings

      </div>
    </OnboardingShell>
  );

  return null;
}

      // Build clean message history — only string content (no vision blobs that can exceed limits)
      const msgs = updated[activePillar].map(m => ({
        role: m.role,
        content: typeof m.content === "string" ? m.content : txt,
      })).filter(m => m.content && m.role);

      const reply = await callClaude(sys, msgs, true);
      if (!reply) throw new Error("Empty response");

          const hP = PILLARS.find(p => p.id === ho.handoff);
          if (hP) {
            const hSys   = getAdvisorSys(ho.handoff, profile, memory, brandKit, true, ho.reason||"", r1, savedWork);

              const r2   = { ...r1, [activePillar]:[...r1[activePillar], hMsg] };
              setConvos(r2); ss("fc_c", r2);

        }

      // Memory extraction — quiet background process
      try {
        const snippet = updated[activePillar].slice(-3)

Output ONLY valid JSON (no markdown):
{"headline":"","primaryText":"","hook":"","cta":"","hashtags":[],"googleHeadlines":["","",""],"googleDescription":"","emailSubject":"","tiktokHook":""}`;

          onMouseEnter={e=>e.currentTarget.style.background="rgba(167,139,250,0.12)"}

          <span style={{fontSize:14}}>✨</span>

          <span style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontWeight:300}}>— makes every creative, ad, and report match your brand</span>

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div>
                <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(22px,4vw,36px)",fontWeight:900,lineHeight:1.1}}>
                  {isIdea?"Building your future,":"Your War Room,"}<br/>
                  <span style={{background:"linear-gradient(90deg,#F4C430,#FF6B35,#F4C430)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"fcs 3s linear infinite"}}>{profile.ownerName?.split(" ")[0]}</span>

              </div>
              {/* Custom title */}
              <input value={newGoal.title} onChange={e=>setNewGoal(g=>({...g,title:e.target.value}))} placeholder="e.g. Book 3 weddings this quarter" style={{...SI,width:"100%"}}/>
              {/* Target + unit + deadline */}
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <select value={newGoal.unit} onChange={e=>setNewGoal(g=>({...g,unit:e.target.value}))} style={{...SI,background:"#0c1020",width:80}}>
                  {["$","clients","leads","posts","calls","bookings","events","reviews","units","hrs","#"].map(u=><option key={u} value={u}>{u}</option>)}
                </select>
                <input type="number" value={newGoal.target} onChange={e=>setNewGoal(g=>({...g,target:e.target.value}))} placeholder="Target number" style={{...SI,flex:1,minWidth:100}}/>
                <input type="date" value={newGoal.deadline} onChange={e=>setNewGoal(g=>({...g,deadline:e.target.value}))} style={{...SI,flex:1,minWidth:120}}/>
              </div>
              {/* Pillar selector */}
              <div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Which area is this goal for?</div>
                <div style={{display:"flex",gap:5}}>
                  {PILLARS.map(p=>(
                    <button key={p.id} onClick={()=>setNewGoal(g=>({...g,pillar:p.id}))} style={{flex:1,padding:"8px 0",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:500,transition:"all .2s",background:newGoal.pillar===p.id?`${p.color}18`:"rgba(255,255,255,0.02)",border:`1px solid ${newGoal.pillar===p.id?p.color+"44":"rgba(255,255,255,0.06)"}`,color:newGoal.pillar===p.id?p.color:"rgba(255,255,255,0.35)"}}>
                      <div style={{fontSize:16,marginBottom:2}}>{p.emoji}</div>
                      <div style={{fontSize:9}}>{p.label}</div>
                    </button>
                  ))}
                </div>
              </div>
              <Btn onClick={addGoal} disabled={!newGoal.title} color="#A78BFA" style={{width:"100%"}}>Add Goal</Btn>
            </div>
          </div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {goals.length===0&&<div style={{textAlign:"center",padding:"32px",color:"rgba(255,255,255,0.2)",fontSize:13}}>No goals yet. Set your first target — even small ones build momentum.</div>}
            {goals.filter(g=>!(g.current>=g.target&&g.target>0)).map(g=><GoalCard key={g.id} goal={g} onUpdate={updateGoal} onDelete={()=>{const u=goals.filter(x=>x.id!==g.id);setGoals(u);ss("fc_g",u);}}/>)}
            {goals.filter(g=>g.current>=g.target&&g.target>0).length>0&&<>
              <div style={{fontSize:9,letterSpacing:2,color:"rgba(255,255,255,0.2)",textTransform:"uppercase",marginTop:6}}>✅ Completed</div>
              {goals.filter(g=>g.current>=g.target&&g.target>0).map(g=><GoalCard key={g.id} goal={g} onUpdate={updateGoal} onDelete={()=>{const u=goals.filter(x=>x.id!==g.id);setGoals(u);ss("fc_g",u);}}/>)}
            </>}
          </div>
        </div>
      )}

      {/* ══ HEALTH SCORE ═════════════════════════════════════════════════ */}
      {view==="health"&&<HealthScoreSection profile={profile} goals={goals} wins={wins} convos={convos} revLog={revLog} finData={finData} onNavigate={(v,p)=>{if(p)setActivePillar(p);setView(v);}}/>}

      {/* ══ 90-DAY PLAYBOOK ══════════════════════════════════════════════ */}
      {view==="playbook"&&<PlaybookSection profile={profile}/>}
      {view==="build"&&<BusinessBuilderSection profile={profile} brandKit={brandKit} goals={goals}/>}
      {view==="social"&&<SocialPostsSection profile={profile} brandKit={brandKit}/>}
      {view==="outreach"&&<OutreachSection profile={profile} brandKit={brandKit}/>}
      {view==="sales"&&<SalesToolkitSection profile={profile} brandKit={brandKit}/>}

      {/* ══ CRM ══════════════════════════════════════════════════════════ */}
      {view==="pipeline"&&<PipelineSection profile={profile} brandKit={brandKit}/>}
      {view==="crm"&&<CRMSection profile={profile}/>}

      {view==="brand"&&<BrandSection profile={profile} brandKit={brandKit} setBrandKit={setBrandKit}/>}

      {/* ══ GROWTH ENGINE ════════════════════════════════════════════ */}
      {view==="seo"        && <LocalSEOEngine     profile={profile}/>}
      {view==="followup"   && <FollowUpEngine     profile={profile}/>}
      {view==="missedcall" && <MissedCallRecovery profile={profile}/>}
      {view==="leads"      && <WeeklyLeadPlan     profile={profile}/>}

      {/* ══ PROFILE ══════════════════════════════════════════════════════ */}
      {view==="profile"&&(
        <div style={{padding:"22px 16px 60px",maxWidth:520,margin:"0 auto"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#fff",marginBottom:18}}>Profile & Settings</div>
          <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"14px",marginBottom:12}}>
            {Object.entries({Mode:isIdea?"💡 Idea Stage":"🏢 Active Business",Name:profile.ownerName,[isIdea?"Idea":"Business"]:isIdea?profile.ideaDescription:profile.businessName,Industry:profile.industry,Location:`${profile.city}${profile.region?", "+profile.region:""}, ${profile.country}`,Budget:profile.budget,[isIdea?"Time/week":"Revenue"]:isIdea?profile.timeAvailable:`$${Number(profile.revenue||0).toLocaleString()}/mo`,"Revenue Goal":`$${revGoal.toLocaleString()}/mo`,Goals:profile.goals}).map(([k,v])=>(
              <div key={k} style={{display:"flex",gap:11,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.22)",width:100,flexShrink:0}}>{k}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",fontWeight:300}}>{v||"—"}</div>
              </div>
            ))}
          </div>
          {brandKit?.primaryColor&&<div style={{padding:"10px 14px",borderRadius:10,background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
            {brandKit.logoUrl&&<img src={brandKit.logoUrl} style={{height:22,width:22,objectFit:"contain",borderRadius:4}}/>}
            <div style={{width:12,height:12,borderRadius:"50%",background:brandKit.primaryColor}}/>
            <div style={{fontSize:11,color:"rgba(167,139,250,0.8)"}}>Brand kit: {brandKit.voice||"Set"} · {brandKit.primaryColor}</div>
            <button onClick={()=>setView("brand")} style={{marginLeft:"auto",background:"none",border:"none",color:"rgba(167,139,250,0.5)",cursor:"pointer",fontSize:11}}>Edit →</button>
          </div>}
          <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginBottom:10}}>🧠 {memory.length} memories · {Object.values(convos).reduce((a,m)=>a+m.filter(x=>x.role==="user").length,0)} conversations · {wins.length} wins</div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>{if(window.confirm("Reset profile? Clears everything."))setProfile(null);ss("fc_p",null);}} style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",background:"rgba(255,80,80,0.05)",border:"1px solid rgba(255,80,80,0.12)",color:"rgba(255,120,120,0.5)",fontSize:12}}>Reset Profile</button>
            <button onClick={()=>{setMemory([]);ss("fc_m",[]);toast("Memory cleared");}} style={{flex:1,padding:"9px",borderRadius:9,cursor:"pointer",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.25)",fontSize:12}}>Clear Memory ({memory.length})</button>
          </div>
        </div>
      )}

      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // ── PWA: register service worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
      });
    }

    // ── PWA: smart install banner ──
    (function() {
      const DISMISS_KEY = 'fc_install_dismissed';
      if (localStorage.getItem(DISMISS_KEY)) return;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      if (isStandalone) return; // already installed

      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      let deferredPrompt = null;

      function showBanner(mode) {
        if (document.getElementById('fc-install-banner')) return;
        const b = document.createElement('div');
        b.id = 'fc-install-banner';
        b.style.cssText = 'position:fixed;bottom:16px;left:16px;right:16px;max-width:420px;margin:0 auto;background:linear-gradient(135deg,#11151f,#1a1f2e);border:1px solid rgba(244,196,48,0.35);border-radius:16px;padding:16px 18px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,0.55);font-family:"DM Sans",sans-serif;animation:fcSlideUp .4s ease;';
        const msg = mode === 'ios'
          ? 'Tap <strong style="color:#F4C430">Share</strong> &nbsp;→&nbsp; <strong style="color:#F4C430">Add to Home Screen</strong> to install.'
          : 'Install Founder\'s Cabinet for one-tap access to your executive team.';
        const btn = mode === 'ios' ? '' : '<button id="fc-install-yes" style="padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#F4C430,#FF6B35);color:#060910;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;">Install App</button>';
        b.innerHTML = '<style>@keyframes fcSlideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}</style>'
          + '<div style="display:flex;align-items:center;gap:12px;">'
          + '<img src="/icons/icon-192.png" style="width:42px;height:42px;border-radius:10px;flex-shrink:0;" alt=""/>'
          + '<div style="flex:1;font-size:13px;color:rgba(255,255,255,0.85);line-height:1.5;">' + msg + '</div>'
          + '</div>'
          + '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">'
          + '<button id="fc-install-no" style="padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.55);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Not now</button>'
          + btn
          + '</div>';
        document.body.appendChild(b);
        document.getElementById('fc-install-no').onclick = () => {
          localStorage.setItem(DISMISS_KEY, '1');
          b.remove();
        };
        const yes = document.getElementById('fc-install-yes');
        if (yes) yes.onclick = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
          }
          b.remove();
        };
      }

      if (isIOS) {
        // iOS has no install API — show instructions after they've engaged (45s)
        setTimeout(() => showBanner('ios'), 45000);
      } else {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          // Show after 30s of engagement, not instantly (less annoying)
          setTimeout(() => showBanner('android'), 30000);
        });
      }
    })();
  </script>
</body>
