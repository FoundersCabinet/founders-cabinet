// ─── API ─────────────────────────────────────────────────────────────────────
async function callClaude(system, messages, useSearch = false, retries = 2, maxTokens = 1000) {
  for (let i = 0; i <= retries; i++) {
    try {
      if (i > 0) await new Promise(r => setTimeout(r, 1500 * i));
      const res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, messages, useSearch, maxTokens }),
      });
      if (!res.ok) {
        const data = await res.json().catch(()=>({}));
        const errMsg = data.error || ("Server error " + res.status);
        if (res.status >= 500 && i < retries) continue;
        throw new Error(errMsg);
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const text = data.text || "";
      if (!text && i < retries) continue;
      return text || "I couldn't generate a response. Please try again.";
    } catch(e) {
      console.error("callClaude error:", e);
      if (i === retries) throw e;
    }
  }
  return "Unable to respond. Please try again.";
}

async function callClaudeJSON(system, msg, useSearch = false, maxTokens = 1000) {
  try {
    const raw = await callClaude(system, [{ role:"user", content:msg }], useSearch, 2, maxTokens);
    if (!raw) return null;
    const cleaned = raw.replace(/```json|```/g,"").trim();
    // Try direct parse first
    try { return JSON.parse(cleaned); } catch {}
    // Try extracting JSON object from response
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) return JSON.parse(match[0]);
    return null;
  } catch(e) {
    console.error("callClaudeJSON error:", e);
    return null;
  }
}

// Encode image file to base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // full data URL
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Extract dominant colors from an image on canvas
function extractColors(imgEl, count = 5) {
  try {
    const cv = document.createElement("canvas");
    cv.width = 80; cv.height = 80;
    const ctx = cv.getContext("2d");
    ctx.drawImage(imgEl, 0, 0, 80, 80);
    const data = ctx.getImageData(0, 0, 80, 80).data;
    const buckets = {};
    for (let i = 0; i < data.length; i += 16) {
      const r = Math.round(data[i]   / 32) * 32;
      const g = Math.round(data[i+1] / 32) * 32;
      const b = Math.round(data[i+2] / 32) * 32;
      const a = data[i+3];
      if (a < 128) continue; // skip transparent
      const key = `${r},${g},${b}`;
      buckets[key] = (buckets[key]||0) + 1;
    }
    return Object.entries(buckets)
      .sort((a,b) => b[1]-a[1])
      .slice(0, count)
      .map(([k]) => { const [r,g,b] = k.split(","); return `rgb(${r},${g},${b})`; });
  } catch { return []; }
}

function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m) return "#F4C430";
  return "#" + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,"0")).join("");
}

// ─── Geo ─────────────────────────────────────────────────────────────────────
async function detectLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude:lat, longitude:lon } = pos.coords;
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const d = await r.json(); const a = d.address||{};
        resolve({ city:a.city||a.town||a.village||a.county||"Unknown", region:a.state||"", country:a.country||"Unknown" });
      } catch { resolve(null); }
    }, () => resolve(null), { timeout:8000 });
  });
}

// ─── Pull cross-advisor context: what other advisors have said + key user data ──
function buildCrossAdvisorSummary(convos, activePillarId) {
  if (!convos) return "";
  const lines = [];
  for (const pid of Object.keys(convos)) {
    if (pid === activePillarId) continue;
    const msgs = convos[pid] || [];
    const lastAssistant = [...msgs].reverse().find(m => m.role === "assistant" && typeof m.content === "string");
    if (lastAssistant) {
      const advisor = (PILLARS.find(p => p.id === pid)?.role) || pid;
      // Take first 240 chars so the AI has the gist without being overwhelmed
      lines.push(`${advisor} most recently said: "${lastAssistant.content.replace(/\s+/g, " ").slice(0, 240).trim()}${lastAssistant.content.length > 240 ? "…" : ""}"`);
    }
  }
  return lines.length ? `\nWHAT OTHER ADVISORS HAVE SAID (reference this so we speak with one voice):\n${lines.map(l => "• " + l).join("\n")}` : "";
}

// ─── Pull saved work so advisors reference real outputs, not assumptions ────
function buildSavedWorkSummary(savedWork) {
  if (!savedWork) return "";
  const lines = [];
  if (savedWork.businessPlan?.summary) lines.push(`Business Plan summary: ${savedWork.businessPlan.summary.slice(0, 200).trim()}…`);
  if (savedWork.dailyPlan?.oneThing) lines.push(`Today's One Thing: ${savedWork.dailyPlan.oneThing}`);
  if (savedWork.dailyPlan?.weeksLeverage) lines.push(`This week's leverage point: ${savedWork.dailyPlan.weeksLeverage}`);
  const wins = savedWork.wins?.slice(0, 3).map(w => w.title).filter(Boolean);
  if (wins?.length) lines.push(`Recent wins: ${wins.join("; ")}`);
  const revLog = savedWork.revLog || [];
  if (revLog.length) {
    const total = revLog.reduce((s, r) => s + Number(r.amount || 0), 0);
    lines.push(`Revenue logged in app so far: $${total.toLocaleString()}`);
  }
  return lines.length ? `\nUSER'S WORK SO FAR (build on what we already know, don't restart from scratch):\n${lines.map(l => "• " + l).join("\n")}` : "";
}

// ─── Universal honesty + formatting rules baked into every AI call ────────
const FACTUAL_RULES = `
CRITICAL HONESTY RULES (non-negotiable):
1. If you don't have verified, current data, label it clearly:
   - Real-time numbers (CPCs, ad rates, salaries, market sizes): say "directional estimate — verify with [the actual source they should check]"

3. When recommending a tool, platform, or service, only name ones you're confident exist as of late 2024 or early 2025.
4. If the user asks something you genuinely don't know, say so clearly and tell them exactly how to find out.

FORMAT RULES (prevent reading fatigue):
- Lead with the single most important sentence — the answer they need first.
- Use short paragraphs (2-3 sentences max). White space helps.
- Bold ONE key insight per response (the headline takeaway).
- Use bullets for lists of 3+ items. Use prose for flowing thought.
- Keep total length under 300 words unless they ask for depth.
- No corporate filler ("Great question!", "I'd be happy to help"). Start with the answer.
`;

  const hasBrand = !!brandKit?.primaryColor;
  const voice = {
    strategy:  `You are the CSO (Chief Strategy Officer). Give sharp positioning, business-model, and growth-lever advice. When discussing market trends or competitor moves, web-search to ground claims in current data. If you cite a market size or competitor stat, label your confidence ("verified", "directional estimate", or "you should verify").`,
    marketing: `You are the CMO (Chief Marketing Officer). Give platform-specific advice with realistic ranges (not invented exact numbers). When you mention CPC/CPM/conversion benchmarks, label them as "industry-range estimates — verify in your ad platform" unless you've web-searched current ${profile?.city || "local"} data. ${hasBrand?`Always incorporate their brand colors (${brandKit.primaryColor}) and voice (${brandKit.voice||"professional"}).`:""}`,

    sales:     `You are the CSO (Chief Sales Officer). Give concrete scripts, frameworks, and closing techniques. Reference seasonal buying patterns when relevant. Be direct. If you reference a sales methodology, only name well-known ones (SPIN, Challenger, MEDDIC, Sandler, etc.).`,
    mindset:   `You are the founder's mindset coach. Be warm but direct. One clear reframe + one immediate action. No fluff. No toxic positivity. No invented psychological "studies" — speak from observed founder patterns.`,
  };

  if (isHandoff) {
    return `You are the ${p.role} at Founder's Cabinet. Another advisor just answered the founder's question. Add YOUR brief cross-department perspective — 80-120 words max. Build on what was just said; don't repeat it.

${FACTUAL_RULES}

${ctx}${crossAdvisor}${savedSummary}

${voice[pillarId]||""}

Start directly with your insight. No preamble. No "As the ${p.role}...". Just the value.`;
  }

  return `You are the ${p.role} at Founder's Cabinet — a world-class executive advisory firm. The founder is consulting you specifically because of your domain expertise. You speak with the other advisors regularly and you reference their work so the team gives unified, coordinated advice.

${FACTUAL_RULES}

${ctx}${crossAdvisor}${savedSummary}

YOUR ROLE FOR THIS USER: ${isIdea ? "PRE-LAUNCH — help them validate and build their first version." : "ACTIVE BUSINESS — build on what they already have. Don't restart their thinking from zero."}

${voice[pillarId]||""}

When other advisors have already weighed in (see above), build on or constructively challenge their points — never contradict them randomly or pretend you didn't see them. You're one executive team, not five strangers.

Max 350 words. Make every word earn its place.`;
}

// ─── Graphics ─────────────────────────────────────────────────────────────────
function drawGraphic(canvas, { text, subtext, businessName, palette, logoImg }) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height, p = palette;
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,p.bg1); grad.addColorStop(1,p.bg2);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.07;
  ctx.beginPath(); ctx.arc(W*.85,H*.15,H*.4,0,Math.PI*2); ctx.fillStyle=p.accent; ctx.fill();
  ctx.beginPath(); ctx.arc(W*.1,H*.88,H*.22,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Logo
  if (logoImg) {
    try {
      const lSize = Math.floor(W * 0.12);
      const lX = W * 0.08, lY = H * 0.08;
      ctx.save();
      ctx.beginPath();
      ctx.arc(lX + lSize/2, lY + lSize/2, lSize/2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(logoImg, lX, lY, lSize, lSize);
      ctx.restore();
    } catch {}
  }
  ctx.fillStyle=p.accent; ctx.fillRect(W*.08, logoImg?H*.22:H*.11, W*.055, 4);
  ctx.font=`600 ${Math.floor(W*.028)}px Arial`; ctx.fillStyle=p.accent;
  ctx.fillText((businessName||"YOUR BUSINESS").toUpperCase(), W*.08, logoImg?H*.28:H*.17);
  const fs=Math.floor(W*(text.length>50?.052:.068));
  ctx.font=`700 ${fs}px Arial`; ctx.fillStyle=p.text;
  const words=text.split(" "), maxW=W*.84, lineH=fs*1.3;
  let line="",lines=[];
  for(const w of words){ const t=line+w+" "; if(ctx.measureText(t).width>maxW&&line){lines.push(line.trim());line=w+" ";}else line=t;}
  lines.push(line.trim());
  const startY=H*(logoImg?.48:.5)-(lines.length*lineH)/2;
  lines.forEach((l,i)=>ctx.fillText(l,W*.08,startY+i*lineH));
  if(subtext){ctx.fillStyle=p.sub;ctx.font=`300 ${Math.floor(W*.028)}px Arial`;ctx.fillText(subtext,W*.08,startY+lines.length*lineH+20);}
  ctx.fillStyle=p.accent;ctx.globalAlpha=0.25;ctx.fillRect(0,H-5,W,5);ctx.globalAlpha=1;
}

    <div style={{position:"relative",width:size,height:size}}>

function BrandKitSection({ brandKit, onUpdate, profile }) {
  const [analyzing,     setAnalyzing]    = useState(false);
  const [aiBuilding,    setAiBuilding]   = useState(false);
  const [aiField,       setAiField]      = useState(null);
  const [aiFieldError,  setAiFieldError] = useState(null);
  const [aiBuildError,  setAiBuildError] = useState(null);
  const [aiResult,      setAiResult]     = useState(null);
  const [showResult,    setShowResult]   = useState(false);
  const [logoPreview,  setLogoPreview]  = useState(brandKit?.logoUrl||null);
  const [extractedColors, setExtractedColors] = useState(brandKit?.extractedColors||[]);
  const [brandForm, setBrandForm] = useState({
    voice:        brandKit?.voice||"",
    tagline:      brandKit?.tagline||"",
    personality:  brandKit?.personality||"",
    primaryColor: brandKit?.primaryColor||"",
    secondaryColors: brandKit?.secondaryColors||[],
    moodboard:    brandKit?.moodboard||"",
    audience:     brandKit?.audience||"",
    promise:      brandKit?.promise||"",
  });
  const fileRef      = useRef(null);
  const creativeRef  = useRef(null);

  // ── AI Build Individual Field ──────────────────────────────────────────────
  const aiBuildField = async (field) => {
    setAiField(field);
    setAiFieldError(null);
    const biz  = profile?.businessName || profile?.ideaDescription || "the business";
    const ind  = profile?.industry || "";
    const loc  = `${profile?.city||""}, ${profile?.country||""}`;
    const cust = profile?.targetCustomer || "";
    // Each prompt returns a single clean value — no numbered lists, no options
    const prompts = {
      tagline:      `Write ONE punchy tagline for: ${biz} (${ind}), targeting ${cust}. Under 10 words. Bold and memorable. Return ONLY the tagline, nothing else.`,
      voice:        `Brand voice for: ${biz} (${ind}). Return ONLY 4-5 adjectives separated by commas, like: Warm, direct, approachable, local`,
      personality:  `Brand personality for: ${biz} (${ind}). Return ONLY 3-4 adjectives separated by commas, like: Bold, trustworthy, community-driven`,
      primaryColor: `Best primary brand color for: ${biz} (${ind}). Return ONLY a hex code, like: #2E86AB`,
      moodboard:    `Visual identity direction for: ${biz} (${ind}) in ${loc}. Return ONLY 1-2 sentences describing the look and feel.`,
      audience:     `Ideal customer for: ${biz} (${ind}) in ${loc}. Return ONLY one sentence describing them.`,
      promise:      `Core brand promise for: ${biz} (${ind}). What you guarantee customers. Return ONLY one sentence.`,
    };
    try {
      const res = await callClaude(
        "You are a brand strategist. Return ONLY exactly what is asked — one clean answer, no preamble, no numbering, no explanation.",
        [{ role:"user", content: prompts[field] || `Generate ${field} for ${biz}` }],
        false, 2, 300
      );
      // Accept any non-empty response — even if it's not perfect
      // Clean the response and accept anything useful
      const cleaned = res?.trim()
        ?.replace(/^["'`]|["'`]$/g, "")
        ?.replace(/^\d+[.)\s]+/, "")
        ?.replace(/^(here is|here's|the|a|an)\s+/i, "")
        ?.trim();
      if (cleaned && cleaned.length > 2 && !cleaned.toLowerCase().includes("couldn't generate")) {
        setBrandForm(f => ({ ...f, [field]: cleaned }));
        setAiFieldError(null);
      } else {
        // Last resort: if res has content even if not perfectly clean, use it
        const raw = res?.trim();
        if (raw && raw.length > 2 && raw !== "I couldn't generate a response. Please try again.") {
          setBrandForm(f => ({ ...f, [field]: raw }));
          setAiFieldError(null);
        } else {
          setAiFieldError(field);
        }
      }
    } catch(e) {
      console.error("aiBuildField error:", e);
      setAiFieldError(field);
    }
    setAiField(null);
  };

  // ── AI Build Entire Brand Kit ─────────────────────────────────────────────
  // Strategy: make 3 small focused calls instead of one giant JSON call.
  // Small calls are far more reliable than asking for a giant JSON object.
  const aiBuildAll = async () => {
    setAiBuilding(true);
    setShowResult(false);
    setAiBuildError(null);

    const biz  = profile?.businessName || profile?.ideaDescription || "this business";
    const ind  = profile?.industry || "";
    const loc  = `${profile?.city||""}, ${profile?.country||""}`;
    const cust = profile?.targetCustomer || "general consumers";
    const ctx  = `Business: ${biz} | Industry: ${ind} | Location: ${loc} | Customer: ${cust} | Season: ${SEASON} ${YEAR}`;
    const sys  = "You are a senior brand strategist. Be specific and direct. Return ONLY what is asked.";

    try {
      // ── Call 1: Taglines + Voice + Personality (text, fast) ──
      const c1 = await callClaude(sys, [{role:"user", content:
        `${ctx}

Return ONLY these 5 lines, nothing else:
TAGLINE1: [punchy tagline under 8 words]
TAGLINE2: [different punchy tagline under 8 words]
TAGLINE3: [third tagline option]
VOICE: [4-5 adjectives describing brand voice]
PERSONALITY: [3-4 adjectives describing brand personality]`
      }], false, 1, 400);

      // ── Call 2: Promise + Audience + Moodboard (text, fast) ──
      const c2 = await callClaude(sys, [{role:"user", content:
        `${ctx}

Return ONLY these 3 lines, nothing else:
PROMISE: [one sentence brand promise — the core value you deliver]
AUDIENCE: [one sentence describing the ideal customer]
MOODBOARD: [2 sentences on visual direction, look and feel]`
      }], false, 1, 400);

      // ── Call 3: Colors + Competitors + Differentiation (text, fast) ──
      const c3 = await callClaude(sys, [{role:"user", content:
        `${ctx}

Return ONLY these 6 lines, nothing else:
PRIMARY: [hex color code that fits this brand, like #2E86AB]
SECONDARY: [complementary hex color]
ACCENT: [accent hex color]
COMPETITOR1: [real competitor business name]
COMPETITOR2: [real competitor business name]
DIFFERENTIATION: [one sentence on what makes ${biz} unique vs competitors]`
      }], false, 1, 300);

      // ── Parse each response by looking for labeled lines ──
      const grab = (text, label) => {
        const m = text?.match(new RegExp(label + ":\s*(.+)", "i"));
        return m?.[1]?.trim() || "";
      };

      const tagline1  = grab(c1, "TAGLINE1");
      const tagline2  = grab(c1, "TAGLINE2");
      const tagline3  = grab(c1, "TAGLINE3");
      const voice     = grab(c1, "VOICE");
      const personality = grab(c1, "PERSONALITY");
      const promise   = grab(c2, "PROMISE");
      const audience  = grab(c2, "AUDIENCE");
      const moodboard = grab(c2, "MOODBOARD");
      const primary   = grab(c3, "PRIMARY");
      const secondary = grab(c3, "SECONDARY");
      const accent    = grab(c3, "ACCENT");
      const comp1     = grab(c3, "COMPETITOR1");
      const comp2     = grab(c3, "COMPETITOR2");
      const diff      = grab(c3, "DIFFERENTIATION");

      // Validate we got the essential pieces
      if (!tagline1 && !voice && !primary) {
        setAiBuildError("Couldn't generate brand identity. Please try again.");
        setAiBuilding(false);
        return;
      }

      // Build result object from the parsed pieces
      const result = {
        taglineOptions:     [tagline1, tagline2, tagline3].filter(Boolean),
        recommendedTagline: tagline1,
        voice,
        personality,
        promise,
        audience,
        moodboard,
        primaryColor:   primary.match(/#[0-9a-fA-F]{3,6}/)?.[0] || primary,
        secondaryColor: secondary.match(/#[0-9a-fA-F]{3,6}/)?.[0] || secondary,
        accentColor:    accent.match(/#[0-9a-fA-F]{3,6}/)?.[0] || accent,
        colorRationale: `Colors chosen to match the ${ind} industry and ${cust} customer.`,
        competitors:    [comp1, comp2].filter(Boolean),
        differentiation: diff,
        nameAnalysis:   `${biz} — ${ind} focused on ${cust}.`,
        logoDirection:  `Clean, professional design that reflects the ${voice || "brand"} voice.`,
        donts:          ["Don't use generic stock imagery", "Don't use more than 2 fonts", "Don't neglect mobile presentation"],
        fontStyle:      "Clean sans-serif for readability and modern feel",
      };

      setAiResult(result);
      setShowResult(true);
      setBrandForm(f => ({
        ...f,
        tagline:      tagline1 || f.tagline,
        voice:        voice || f.voice,
        personality:  personality || f.personality,
        primaryColor: result.primaryColor || f.primaryColor,
        moodboard:    moodboard || f.moodboard,
        audience:     audience || f.audience,
        promise:      promise || f.promise,
      }));

    } catch(e) {
      console.error("aiBuildAll error:", e);
      setAiBuildError("Something went wrong. Please try again.");
    }
    setAiBuilding(false);
  };

  // ── Apply AI Result ────────────────────────────────────────────────────────
  const applyResult = (taglineIdx) => {
    if (!aiResult) return;
    const updated = {
      ...brandKit,
      ...brandForm,
      tagline:      aiResult.taglineOptions?.[taglineIdx] || brandForm.tagline,
      voice:        aiResult.voice,
      personality:  aiResult.personality,
      primaryColor: aiResult.primaryColor,
      secondaryColors: [aiResult.secondaryColor, aiResult.accentColor].filter(Boolean),
      moodboard:    aiResult.moodboard,
      audience:     aiResult.audience,
      promise:      aiResult.promise,
      logoUrl:      logoPreview,
      extractedColors,
      aiKit:        aiResult,
    };
    onUpdate(updated);
    setShowResult(false);
  };

  // ── Logo Upload ───────────────────────────────────────────────────────────
  const handleLogoUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setAnalyzing(true);
    try {
      const dataUrl = await fileToBase64(file);
      setLogoPreview(dataUrl);
      const img = new Image();
      img.onload = async () => {
        const colors = extractColors(img, 6);
        const hexColors = colors.map(rgbToHex);
        setExtractedColors(hexColors);
        const primary = hexColors[0] || "#F4C430";
        const updated = { ...brandForm, primaryColor:primary, secondaryColors:hexColors.slice(1,4), extractedColors:hexColors, logoUrl:dataUrl };
        setBrandForm(updated);
        try {
          const res = await callClaude("You are a brand strategist. Analyze this logo briefly.", [{
            role:"user", content:[
              { type:"image", source:{ type:"base64", media_type:file.type||"image/png", data:dataUrl.split(",")[1] } },
              { type:"text", text:"Analyze this logo. Return ONLY:\nVOICE: [2-3 words]\nPERSONALITY: [2-3 words]\nTAGLINE: [one punchy tagline under 8 words]" }
            ]
          }]);
          const voice       = res.match(/VOICE:\s*(.+)/)?.[1]?.trim()||"";
          const personality = res.match(/PERSONALITY:\s*(.+)/)?.[1]?.trim()||"";
          const tagline     = res.match(/TAGLINE:\s*(.+)/)?.[1]?.trim()||"";
          const final = { ...updated, voice, personality, taglineSuggestion:tagline, logoAnalyzed:true };
          setBrandForm(f => ({ ...f, voice, personality }));
          onUpdate(final);
        } catch {}
        setAnalyzing(false);
      };
      img.src = dataUrl;
    } catch { setAnalyzing(false); }
  };

  const handleCreativeUpload = async (e) => {
    const files = Array.from(e.target.files).slice(0,4);
    const existing = brandKit?.creatives||[];
    const newC = [];
    for (const file of files) { const d = await fileToBase64(file); newC.push({ name:file.name, url:d, type:file.type }); }
    onUpdate({ ...brandKit, ...brandForm, logoUrl:logoPreview, creatives:[...existing,...newC].slice(0,8) });
  };

  const save = () => onUpdate({ ...brandKit, ...brandForm, logoUrl:logoPreview, extractedColors });

  // ── AI Field Button ───────────────────────────────────────────────────────
  const AiBtn = ({ field }) => {
    const isLoading = aiField === field;
    const isError   = aiFieldError === field;
    const anyLoading = !!aiField;
    return (
      <button
        onClick={() => { setAiFieldError(null); aiBuildField(field); }}
        disabled={anyLoading}
        style={{ padding:"5px 11px", borderRadius:8, background:isError?"rgba(255,107,53,0.12)":isLoading?"rgba(167,139,250,0.2)":"rgba(167,139,250,0.12)", border:`1px solid ${isError?"rgba(255,107,53,0.4)":isLoading?"rgba(167,139,250,0.5)":"rgba(167,139,250,0.25)"}`, color:isError?"#FF6B35":"#A78BFA", cursor:anyLoading?"not-allowed":"pointer", fontSize:10, fontWeight:600, display:"flex", alignItems:"center", gap:4, flexShrink:0, whiteSpace:"nowrap", minWidth:52, justifyContent:"center", transition:"all .2s" }}>
        {isLoading ? <><span style={{width:8,height:8,borderRadius:"50%",border:"1.5px solid rgba(167,139,250,0.3)",borderTop:"1.5px solid #A78BFA",display:"inline-block",animation:"spin .6s linear infinite"}}/><span>...</span></> : isError ? <span>↻ Retry</span> : <span>✨ AI</span>}
      </button>
    );
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

      {/* ── HERO: Build It For Me ── */}

// ─── HEALTH SCORE ─────────────────────────────────────────────────────────────
function HealthScoreSection({ profile, goals, wins, convos, revLog, finData, onNavigate }) {
  const [insight, setInsight] = useState("");
  const [loading, setLoading] = useState(false);
  const calc = useCallback(() => {
    const tc  = Object.values(convos).reduce((a,m)=>a+m.filter(x=>x.role==="user").length,0);
    const mkt = (convos["marketing"]||[]).filter(x=>x.role==="user").length;
    const fin = (convos["finance"]||[]).filter(x=>x.role==="user").length;
    const sal = (convos["sales"]||[]).filter(x=>x.role==="user").length;
    const mnd = (convos["mindset"]||[]).filter(x=>x.role==="user").length;
    const revGoal=Number(profile?.revenueGoal||0);
    const curRev=revLog.length?revLog[revLog.length-1].amount:Number(profile?.revenue||0);
    const invPaid=finData.invoices.filter(i=>i.status==="Paid").length;
    const invTotal=finData.invoices.length;
    const gc=goals.filter(g=>g.current>=g.target&&g.target>0).length;
    const gt=goals.length;
    return {
      marketing:  Math.min(100,Math.round(mkt*8 + wins.filter(w=>w.title?.toLowerCase().includes("client")||w.title?.toLowerCase().includes("post")).length*10)),
      finance:    Math.min(100,Math.round(finData.revenue.length*8 + finData.expenses.length*5 + (invTotal>0?(invPaid/invTotal)*30:0) + (revGoal>0?Math.min((curRev/revGoal)*40,40):0))),
      sales:      Math.min(100,Math.round(sal*10 + finData.invoices.length*8 + wins.length*4)),
      operations: Math.min(100,Math.round((gt>0?(gc/gt)*40:0) + tc*3 + revLog.length*8)),
      mindset:    Math.min(100,Math.round(mnd*12 + wins.length*8 + (tc>0?20:0))),
    };
  }, [profile,goals,wins,convos,revLog,finData]);
  const s = calc();
  const overall = Math.round((s.marketing+s.finance+s.sales+s.operations+s.mindset)/5);
  const DIMS = [
    {key:"marketing",label:"Marketing",color:"#FF6B35",icon:"📣"},
    {key:"finance",  label:"Finance",  color:"#00C897",icon:"💰"},
    {key:"sales",    label:"Sales",    color:"#A78BFA",icon:"🤝"},
    {key:"operations",label:"Operations",color:"#F4C430",icon:"⚙️"},
    {key:"mindset",  label:"Mindset",  color:"#F472B6",icon:"🧠"},
  ];
  const grade = overall>=80?"A":overall>=65?"B":overall>=50?"C":overall>=35?"D":"F";
  const statusColor = (sc) => sc>=75?"#00C897":sc>=50?"#F4C430":sc>=30?"#FF6B35":"#FF4444";
  const status = (sc) => sc>=75?"Strong":sc>=50?"Building":sc>=30?"Needs Work":"Critical";
  const getInsight = async () => {
    setLoading(true);
    try {
      const weakest = DIMS.slice().sort((a,b)=>s[a.key]-s[b.key])[0];
      const res = await callClaude("You are a sharp business diagnostician. 180 words max. Specific and direct.",[{role:"user",content:`Health Scores for ${profile?.businessName||profile?.ideaDescription}: ${DIMS.map(d=>`${d.label}:${s[d.key]}`).join(", ")} | Overall:${overall}/100 | Location:${profile?.city},${profile?.country} | Season:${SEASON} | Industry:${profile?.industry}\n\nWeakest: ${weakest.label} (${s[weakest.key]}/100)\n\nGive:\n1. ONE key diagnosis of their biggest weakness\n2. The single most important action THIS WEEK\n3. One quick win they can do TODAY under 20 minutes`}],false,2,1000);
      setInsight(res);
    } catch { setInsight("Could not generate insight. Please try again."); }
    setLoading(false);
  };
  return (
    <div style={{padding:"22px 18px 40px",maxWidth:860,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div><div style={{fontSize:10,letterSpacing:3,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",marginBottom:4}}>Business Diagnostic</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:900,color:"#fff"}}>Health Score</div></div>
        <Btn onClick={getInsight} disabled={loading} color="#F4C430" style={{fontSize:12,padding:"9px 16px"}}>{loading?"Analyzing...":"🔍 Get AI Diagnosis"}</Btn>
      </div>
      <div style={{background:"rgba(244,196,48,0.04)",border:"1px solid rgba(244,196,48,0.2)",borderRadius:16,padding:"24px",marginBottom:16,display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
        <ScoreRing score={overall} size={100}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,color:"#fff",marginBottom:4}}>Grade: <span style={{color:overall>=75?"#00C897":overall>=50?"#F4C430":"#FF6B35"}}>{grade}</span></div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",fontWeight:300,marginBottom:12}}>{overall>=75?"Strong operation — focus on scaling.":overall>=50?"Good foundation — targeted improvements will unlock the next level.":overall>=30?"Early stage — consistent daily action moves the needle fast.":"Every action from here builds the foundation."}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {DIMS.map(d=><div key={d.key} style={{padding:"3px 10px",borderRadius:12,background:`${statusColor(s[d.key])}15`,border:`1px solid ${statusColor(s[d.key])}33`,fontSize:10,color:statusColor(s[d.key])}}>{d.icon} {d.label}: {status(s[d.key])}</div>)}
          </div>
        </div>
      </div>
      {DIMS.map(d=>(

  const goal  = (profile?.goals || []).join("; ");

  const generatePlan = async () => {
    setBuilding(true);
    setError(null);
    setProgress(0);

    const ctx = `Business: ${biz}
Industry: ${ind}
Location: ${loc}
Stage: ${stage}
Target Customer: ${cust}
Goals: ${goal}
Marketing Budget: ${budget}
Brand Voice: ${brandKit?.voice || "Not set"}
Brand Tagline: ${brandKit?.tagline || "Not set"}`;

    const sys = `You are a senior business consultant writing a personalized business plan. Be specific, actionable, direct. No fluff, no filler.

HONESTY RULES (non-negotiable):
- For market size, industry growth rate, competitor revenue, or any specific statistic: if you don't have a verified source, write "directional estimate" or "industry-pattern based — verify with current local data". Never invent specific numbers.
- For pricing benchmarks: give realistic ranges, not invented exact figures. Tell the user how to verify.
- For local market specifics (Toronto CPCs, Vaughan demographics, etc.): note "you'll want to confirm with current local data" if you're not sure.
- If you'd need to fabricate a citation to support a number, leave the number out.

FORMAT RULES (prevent reading fatigue):
- Lead each section with a one-sentence headline takeaway.
- Short paragraphs (2-3 sentences max).
- Use bullets for lists. Use bold sparingly — once or twice per section for the key insight.
- Write at a grade-9 reading level. Plain words, not jargon.
- Do NOT use markdown headers (#, ##) or horizontal rules (---). Plain paragraphs and simple dash bullets only. You may use **bold** for one key phrase per section.`;
    const sections = {};

    try {

      setProgressLabel("Writing executive summary...");
      setProgress(10);
      sections.summary = await callClaude(sys,
        [{role:"user",content:`Write a 2-paragraph executive summary for this business plan. Make it inspiring and specific.\n\n${ctx}`}],
        false, 1, 600);

      // ── Section 2: Market Opportunity ──
      setProgressLabel("Analyzing market opportunity...");
      setProgress(22);
      sections.market = await callClaude(sys,
        [{role:"user",content:`Write a market opportunity section (3 paragraphs): the size of the opportunity in ${loc}, the gap this business fills, and why now is the right time. Be specific with numbers where possible.\n\n${ctx}`}],
        false, 1, 700);

      // ── Section 3: Ideal Customer Profile ──
      setProgressLabel("Defining your ideal customer...");
      setProgress(34);
      sections.customer = await callClaude(sys,
        [{role:"user",content:`Write a detailed Ideal Customer Profile (ICP). Include: demographics, psychographics, pain points, where they hang out, what they read, how they buy. 3 paragraphs.\n\n${ctx}`}],
        false, 1, 700);

      // ── Section 4: Pricing & Revenue Model ──
      setProgressLabel("Building pricing strategy...");
      setProgress(46);
      sections.pricing = await callClaude(sys,
        [{role:"user",content:`Write a pricing & revenue model section. Include: 3 specific package tiers with prices, what's included in each, why the pricing makes sense for ${loc}, and projected revenue at month 6 and month 12. Be direct with numbers.\n\n${ctx}`}],
        false, 1, 800);

      // ── Section 5: Marketing Strategy ──
      setProgressLabel("Building marketing plan...");
      setProgress(58);
      sections.marketing = await callClaude(sys,
        [{role:"user",content:`Write a marketing strategy section. Include: 3 specific channels to focus on first, exact tactics for each (specific platforms, content types, frequencies), and weekly action items. Realistic for ${budget} budget.\n\n${ctx}`}],
        false, 1, 800);

      // ── Section 6: 90-Day Action Plan ──
      setProgressLabel("Writing 90-day playbook...");
      setProgress(70);
      sections.actionPlan = await callClaude(sys,
        [{role:"user",content:`Write a 90-day action plan. Format: "Days 1-30:", "Days 31-60:", "Days 61-90:". For each phase, list 4-5 specific actions with concrete deliverables (not "build website" but "register domain on Namecheap, set up Wix template, write About page").\n\n${ctx}`}],
        false, 1, 1000);

      // ── Section 7: Financial Projections ──
      setProgressLabel("Calculating financial projections...");
      setProgress(82);
      sections.financials = await callClaude(sys,
        [{role:"user",content:`Write financial projections section. Include: realistic month 1, month 3, month 6, and month 12 revenue projections. Major expense categories. Break-even point. Cash flow notes. Be specific with numbers.\n\n${ctx}`}],
        false, 1, 700);

      // ── Section 8: Risks & Mitigations ──
      setProgressLabel("Identifying risks & mitigations...");
      setProgress(94);
      sections.risks = await callClaude(sys,
        [{role:"user",content:`Write a risks & mitigations section. Identify 4 specific risks for THIS business and provide a concrete mitigation strategy for each.\n\n${ctx}`}],
        false, 1, 600);

      // ── Compile & Save ──
      setProgressLabel("Compiling your business plan...");
      setProgress(100);
      const plan = {
        ...sections,
        meta: { biz, ind, loc, cust, generatedAt: new Date().toISOString(), founderName: profile?.ownerName || "Founder" }
      };
      ss("fc_business_plan", plan);
      setSavedPlan(plan);
      setCompleted(plan);
      setBuilding(false);
    } catch(e) {
      console.error("Business plan error:", e);
      setError("Couldn't generate your plan. Please try again.");
      setBuilding(false);
    }
  };

  // ── Generate the actual PDF using browser print ──
  const downloadPDF = (plan) => {
    // Default to Founder's Cabinet brand colors when user hasn't set their own
    const hasBrand = !!brandKit?.primaryColor;
    const accent     = hasBrand ? brandKit.primaryColor : "#F4C430";    // gold
    const accent2    = hasBrand ? (brandKit.secondaryColor || accent)   // their secondary or fallback
                                : "#FF6B35";                              // signature coral
    const darkBg     = "#0a0e1a";
    const subtleGray = "#f7f5f0";
    const tagline    = brandKit?.tagline || "";

    // ── Smart cover title: short business names get the big treatment;
    //    long descriptions get scaled down + the description moves to the tagline slot ──
    const rawBiz = (plan.meta.biz || "Business Plan").trim();
    const isLongTitle = rawBiz.length > 50;
    const coverTitle  = isLongTitle ? (profile?.businessName || "Your Business Plan") : rawBiz;
    const coverSub    = isLongTitle
      ? rawBiz                                           // long description becomes the elegant italic subtitle
      : (tagline || `${plan.meta.ind} · ${plan.meta.loc}`);
    const titleSize   = coverTitle.length > 40 ? 34 : coverTitle.length > 24 ? 44 : 56;

    // ── Convert AI markdown (# headers, **bold**, --- rules, bullets) to clean HTML ──
    const mdSection = (text) => {
      if (!text) return "";
      let t = String(text)
        .replace(/^\s*#{1,6}\s*(.+)$/gm, "@@H@@$1@@/H@@")     // headers → markers
        .replace(/^\s*[-–—_*]{3,}\s*$/gm, "")                  // horizontal rules → gone
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")      // bold
        .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>"); // italic
      const lines = t.split("\n");
      const out = [];
      let inList = false, para = [];
      const flushPara = () => {
        const joined = para.join(" ").trim();
        if (joined) out.push(`<p>${joined}</p>`);
        para = [];
      };
      for (const lineRaw of lines) {
        const line = lineRaw.trim();
        const bullet = line.match(/^[•\-\*]\s+(.+)$/);
        const header = line.match(/^@@H@@(.+)@@\/H@@$/);
        if (header) {
          flushPara();
          if (inList) { out.push("</ul>"); inList = false; }
          out.push(`<h3 class="sub-h">${header[1].trim()}</h3>`);
        } else if (bullet) {
          flushPara();
          if (!inList) { out.push('<ul class="pdf-list">'); inList = true; }
          out.push(`<li>${bullet[1].trim()}</li>`);
        } else if (line === "") {
          flushPara();
          if (inList) { out.push("</ul>"); inList = false; }
        } else {
          if (inList) { out.push("</ul>"); inList = false; }
          para.push(line);
        }
      }
      flushPara();
      if (inList) out.push("</ul>");
      return out.join("\n");
    };

    const html = `<!DOCTYPE html>

    padding: 1in 0.85in;

function SocialPostsSection({ profile, brandKit }) {
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(0);
  const [progressLabel, setProgressLabel] = useState("");
  const [posts, setPosts] = useState([]);
  const [error, setError] = useState(null);
  const [activeFilter, setActiveFilter] = useState("all");
  const [downloading, setDownloading] = useState(null);

  // Load saved posts
  useEffect(() => {
    sg("fc_social_posts").then(p => p?.length && setPosts(p));
  }, []);

  const biz   = profile?.businessName || profile?.ideaDescription?.slice(0,60) || "your business";
  const ind   = profile?.industry?.split("(")[0]?.trim() || "your industry";
  const loc   = `${profile?.city || ""}, ${profile?.region || ""}`.replace(/^[, ]+|[, ]+$/g,"") || "your area";
  const cust  = (profile?.targetCustomer || []).join("; ") || "your customers";
  const voice = brandKit?.voice || "professional and friendly";
  const tagline = brandKit?.tagline || "";
  const primary = brandKit?.primaryColor || "#F4C430";

  const POST_TYPES = ["educational", "promotional", "behind-the-scenes", "customer-focused", "inspirational", "industry-tip", "story", "engagement-question"];
  const PLATFORMS = ["instagram", "tiktok", "facebook", "linkedin"];

  const generatePosts = async () => {
    setGenerating(true);
    setError(null);
    setProgress(0);
    setPosts([]);

    const ctx = `Business: ${biz}
Industry: ${ind}
Location: ${loc}
Customer: ${cust}
Brand Voice: ${voice}
Tagline: ${tagline}`;

    const sys = "You are an expert social media strategist. Write captions that drive engagement. Be specific, not generic. Use the brand voice. Output ONLY the requested format.";
    const allPosts = [];

    try {
      // Generate 4 batches of ~7-8 posts each (30 total)
      const batches = [
        { week:"Week 1: Foundation", focus:"Introduce the brand, build trust, share origin story and values" },
        { week:"Week 2: Authority",  focus:"Educational content, industry tips, demonstrate expertise" },
        { week:"Week 3: Engagement", focus:"Customer stories, behind-the-scenes, ask questions" },
        { week:"Week 4: Conversion", focus:"Promotional content, social proof, calls to action, offers" },
      ];

      for (let i = 0; i < batches.length; i++) {
        const batch = batches[i];
        setProgressLabel(`Generating ${batch.week}...`);
        setProgress(Math.round((i / batches.length) * 90));

        const raw = await callClaude(sys,
          [{ role:"user", content:
            `${ctx}

Write 7-8 social media posts for ${batch.week}. Focus: ${batch.focus}.

Return ONLY this format, exactly. No other text, no markdown:

POST 1
PLATFORM: instagram
TYPE: educational
HOOK: [first line that stops the scroll, max 12 words]
CAPTION: [full caption, 80-120 words, conversational, with line breaks marked as |]
HASHTAGS: [8-12 relevant hashtags space-separated]
CTA: [specific call to action]
---
POST 2
PLATFORM: tiktok
...

Vary platforms across instagram, tiktok, facebook, linkedin. Vary types: educational, promotional, behind-the-scenes, customer-focused, inspirational, industry-tip, story, engagement-question. Make EACH post specific to ${biz} — not generic.` }],
          false, 1, 2200);

        // Parse posts
        const blocks = raw.split(/^---\s*$|^POST \d+/m).filter(b => b.trim().length > 50);
        for (const block of blocks) {
          const grab = (label) => block.match(new RegExp(label + ":\\s*(.+?)(?=\\n[A-Z]+:|$)", "is"))?.[1]?.trim() || "";
          const platform = grab("PLATFORM").toLowerCase().trim();
          const type     = grab("TYPE").toLowerCase().trim();
          const hook     = grab("HOOK");
          const caption  = grab("CAPTION").replace(/\|/g, "\n");
          const hashtags = grab("HASHTAGS");
          const cta      = grab("CTA");
          if (hook && caption && platform) {
            allPosts.push({
              id: `p_${Date.now()}_${allPosts.length}`,
              week: batch.week.split(":")[0],
              platform: PLATFORMS.includes(platform) ? platform : "instagram",
              type: type || "educational",
              hook, caption, hashtags, cta,
              dayNumber: allPosts.length + 1,
            });
          }
        }
      }

      setProgress(100);
      setProgressLabel("Done!");
      ss("fc_social_posts", allPosts);
      setPosts(allPosts);
      setTimeout(() => setGenerating(false), 600);
    } catch(e) {
      console.error("Social posts error:", e);
      setError("Couldn't generate posts. Please try again.");
      setGenerating(false);
    }
  };

  // Generate a branded post graphic as PNG using HTML Canvas
  const generateGraphic = async (post) => {
    setDownloading(post.id);
    try {
      // Sizes per platform
      const sizes = {
        instagram: { w:1080, h:1080 },
        tiktok:    { w:1080, h:1920 },
        facebook:  { w:1200, h:630  },
        linkedin:  { w:1200, h:627  },
      };

      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;

      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, primary);
      grad.addColorStop(1, shadeColor(primary, -40));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Decorative circle
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.beginPath();
      ctx.arc(w * 0.85, h * 0.15, w * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(w * 0.1, h * 0.85, w * 0.18, 0, Math.PI * 2);
      ctx.fill();

      // Hook text - large, bold, centered
      const isPortrait = h > w;
      const padding = w * 0.08;
      const maxTextWidth = w - padding * 2;
      const fontSize = isPortrait ? w * 0.07 : w * 0.05;

      ctx.fillStyle = "#ffffff";
      ctx.font = `900 ${fontSize}px Georgia, serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // Word wrap
      const words = post.hook.split(" ");
      const lines = [];
      let currentLine = "";
      for (const word of words) {
        const testLine = currentLine ? currentLine + " " + word : word;
        if (ctx.measureText(testLine).width > maxTextWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) lines.push(currentLine);

      const lineHeight = fontSize * 1.2;
      const totalTextHeight = lines.length * lineHeight;
      const startY = (h - totalTextHeight) / 2;

      lines.forEach((line, i) => {
        ctx.fillText(line, w / 2, startY + i * lineHeight + lineHeight / 2);
      });

      // Tagline at bottom
      if (tagline) {
        ctx.font = `400 ${w * 0.022}px sans-serif`;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillText(tagline, w / 2, h - padding);
      }

      // Business name top
      ctx.font = `600 ${w * 0.025}px sans-serif`;
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.textAlign = "left";
      ctx.fillText(biz, padding, padding + w * 0.025);

      link.download = `${biz.replace(/[^a-z0-9]/gi,"_").toLowerCase()}_${post.platform}_day${post.dayNumber}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();

// Helper for shading colors in canvas graphics
function shadeColor(hex, percent) {
  const num = parseInt(hex.replace("#",""),16);
  const r = Math.max(0, Math.min(255, ((num>>16)&0xff) + percent));
  const g = Math.max(0, Math.min(255, ((num>>8)&0xff) + percent));
  const b = Math.max(0, Math.min(255, (num&0xff) + percent));
  return "#" + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
}

                  <button onClick={()=>copyMessage(f.id||`f_${i}`, fullText)} style={{width:"100%", padding:"10px", borderRadius:8, border:"none", background:copiedId===(f.id||`f_${i}`)?"#00C897":"linear-gradient(135deg,#A78BFA,#F472B6)", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer"}}>

                  </button>

          )}

      )}

  );
}

// ─── SALES TOOLKIT — Close More Deals ──────────────────────────────────────
function SalesToolkitSection({ profile, brandKit }) {
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(0);
  const [progressLabel, setProgressLabel] = useState("");
  const [toolkit, setToolkit] = useState(null);
  const [error, setError] = useState(null);
  const [activeTab, setActiveTab] = useState("discovery");
  const [copiedId, setCopiedId] = useState(null);
  const [proposalData, setProposalData] = useState({ clientName:"", projectName:"", scope:"", price:"", timeline:"", deposit:"" });

  useEffect(() => {
    sg("fc_sales_toolkit").then(t => t && setToolkit(t));
  }, []);

  const biz   = profile?.businessName || profile?.ideaDescription?.slice(0,60) || "your business";
  const ind   = profile?.industry?.split("(")[0]?.trim() || "your industry";
  const loc   = `${profile?.city || ""}, ${profile?.region || ""}`.replace(/^[, ]+|[, ]+$/g,"") || "your area";
  const cust  = (profile?.targetCustomer || []).join("; ") || "potential customers";
  const voice = brandKit?.voice || "professional and confident";
  const ownerName = profile?.ownerName || "Founder";
  const tagline = brandKit?.tagline || "";
  const accent = brandKit?.primaryColor || "#F4C430";

  const generateToolkit = async () => {
    setGenerating(true);
    setError(null);
    setProgress(0);

    const ctx = `Business: ${biz}
Industry: ${ind}
Location: ${loc}
Target Customer: ${cust}
Brand Voice: ${voice}
Founder: ${ownerName}`;

    const sys = "You are a top sales coach. Write specific, conversion-focused sales materials. No fluff. Output ONLY in the exact format requested.";
    const result = {};

    try {
      // ── 1. Discovery call script ──
      setProgressLabel("Writing discovery call script...");
      setProgress(15);
      const discoveryRaw = await callClaude(sys,
        [{role:"user",content:`${ctx}

Write a complete 10-question discovery call script. Each question should: qualify the prospect, uncover pain, build rapport, or surface budget. Order matters — start light, build to harder questions.

Return ONLY this format:

OPENING: [exactly what to say in the first 30 seconds to set the tone]
---
QUESTION 1
ASK: [the exact question]
WHY: [why this question, what you're listening for]
LISTEN_FOR: [specific phrases or signals that indicate a good fit]
---
QUESTION 2
...
(continue for all 10)
---
CLOSE: [exactly how to end the call and set next steps]`}],
        false, 1, 2200);

      // ── 2. Objection handlers ──
      setProgressLabel("Building objection handlers...");
      setProgress(35);
      const objectionRaw = await callClaude(sys,
        [{role:"user",content:`${ctx}

Write responses to the 10 most common objections this business will face. For ${ind} businesses, the typical objections are: too expensive, need to think about it, need to talk to spouse/partner, can do it myself, already working with someone, bad timing, don't see the value, need more time to research, scared of commitment, want a guarantee.

Return ONLY this format:

OBJECTION 1
THEIR_WORDS: [exactly what they say]
WHAT_THEY_REALLY_MEAN: [the real concern underneath]
YOUR_RESPONSE: [a specific, conversion-focused response in the brand voice — 2-3 sentences max]
FOLLOW_UP_QUESTION: [a question to ask after your response that moves the deal forward]
---
OBJECTION 2
...
(all 10)`}],
        false, 1, 2200);

      // ── 3. Proposal template ──
      setProgressLabel("Building proposal template...");
      setProgress(55);
      const proposalRaw = await callClaude(sys,
        [{role:"user",content:`${ctx}

Write a complete proposal template. Should be persuasive, specific, and look professional. Use [BRACKETS] for client-specific fields. Include sections that build value before showing price.

Return ONLY this format:

COVER_LINE: [one-line hook for the cover/intro]
INTRO: [2-3 sentences personalized to the client about why you understand their situation]
THE_PROBLEM: [restate their challenge clearly to show you listened]
THE_SOLUTION: [your specific approach — 3-4 sentences]
WHATS_INCLUDED: [bullet list of 5-7 specific deliverables, with hyphens]
TIMELINE: [3-step timeline with weeks]
INVESTMENT: [pricing structure with [PRICE] placeholders — present 3 options if appropriate]
WHY_US: [3 short reasons to choose ${biz}]
NEXT_STEPS: [exactly what they should do next to move forward]
PS: [a personal P.S. that creates urgency or reinforces value]`}],
        false, 1, 1800);

      // ── 4. Service agreement / contract ──
      setProgressLabel("Drafting service agreement...");
      setProgress(75);
      const contractRaw = await callClaude(sys,
        [{role:"user",content:`${ctx}

Write a service agreement / contract template appropriate for ${ind} businesses. Include all standard clauses but keep language plain and readable, not legalese. Use [BRACKETS] for fields to fill in.

Return ONLY this format:

TITLE: SERVICE AGREEMENT
PARTIES: [agreement between [CLIENT_NAME] ("Client") and ${biz} ("Service Provider")]
SCOPE: [what services will be provided — 2-3 sentences with brackets for specifics]
TIMELINE: [start date, milestones, end date with brackets]
PAYMENT: [deposit amount, payment schedule, late fees, accepted payment methods]
REVISIONS: [how many revisions included, cost for additional]
CANCELLATION: [refund policy, notice period]
INTELLECTUAL_PROPERTY: [who owns what after delivery]
CONFIDENTIALITY: [standard NDA clause]
LIABILITY: [limitation of liability]
DISPUTE_RESOLUTION: [how disputes will be handled]
SIGNATURES: [signature blocks for both parties]
DISCLAIMER: [Note: This is a template. Get it reviewed by a lawyer before using with real clients.]`}],
        false, 1, 1800);

      // ── 5. Closing scripts ──
      setProgressLabel("Writing closing scripts...");
      setProgress(92);
      const closingRaw = await callClaude(sys,
        [{role:"user",content:`${ctx}

Write 6 specific closing scripts — the exact words to say to ask for the deposit and close the deal. Different scripts for different situations.

Return ONLY this format:

CLOSE 1
SITUATION: [when to use this close, e.g., "After a great discovery call where they showed strong interest"]
SCRIPT: [the exact words to say, conversational, in the brand voice]
WHY_IT_WORKS: [one sentence on the psychology]
---
CLOSE 2
...
(all 6, covering: assumptive close, soft close, urgency close, alternative close, summary close, takeaway close)`}],
        false, 1, 1500);

      setProgress(98);
      setProgressLabel("Compiling your sales toolkit...");

      result.discovery  = parseToolkitBlock(discoveryRaw, "QUESTION", ["ASK","WHY","LISTEN_FOR"], { opening: extractField(discoveryRaw, "OPENING"), closing: extractField(discoveryRaw, "CLOSE") });
      result.objections = parseToolkitBlock(objectionRaw, "OBJECTION", ["THEIR_WORDS","WHAT_THEY_REALLY_MEAN","YOUR_RESPONSE","FOLLOW_UP_QUESTION"]);
      result.proposal   = {
        coverLine:    extractField(proposalRaw, "COVER_LINE"),
        intro:        extractField(proposalRaw, "INTRO"),
        problem:      extractField(proposalRaw, "THE_PROBLEM"),
        solution:     extractField(proposalRaw, "THE_SOLUTION"),
        included:     extractField(proposalRaw, "WHATS_INCLUDED"),
        timeline:     extractField(proposalRaw, "TIMELINE"),
        investment:   extractField(proposalRaw, "INVESTMENT"),
        whyUs:        extractField(proposalRaw, "WHY_US"),
        nextSteps:    extractField(proposalRaw, "NEXT_STEPS"),
        ps:           extractField(proposalRaw, "PS"),
      };
      result.contract = {
        scope:        extractField(contractRaw, "SCOPE"),
        timeline:     extractField(contractRaw, "TIMELINE"),
        payment:      extractField(contractRaw, "PAYMENT"),
        revisions:    extractField(contractRaw, "REVISIONS"),
        cancellation: extractField(contractRaw, "CANCELLATION"),
        ip:           extractField(contractRaw, "INTELLECTUAL_PROPERTY"),
        confidentiality: extractField(contractRaw, "CONFIDENTIALITY"),
        liability:    extractField(contractRaw, "LIABILITY"),
        dispute:      extractField(contractRaw, "DISPUTE_RESOLUTION"),
      };
      result.closes     = parseToolkitBlock(closingRaw, "CLOSE", ["SITUATION","SCRIPT","WHY_IT_WORKS"]);
      result.generatedAt = new Date().toISOString();

      ss("fc_sales_toolkit", result);
      setToolkit(result);
      setProgress(100);
      setTimeout(() => setGenerating(false), 600);
    } catch(e) {
      console.error("Sales toolkit error:", e);
      setError("Couldn't generate sales toolkit. Please try again.");
      setGenerating(false);
    }
  };

  function extractField(raw, label) {
    const m = raw.match(new RegExp(label + ":\\s*(.+?)(?=\\n[A-Z_]+:|---|$)", "is"));
    return m ? m[1].trim() : "";
  }

  function parseToolkitBlock(raw, headerWord, fields, extra={}) {
    const items = [];
    const sections = raw.split(/^---\s*$/m).filter(s => s.trim().length > 30);
    for (const section of sections) {
      const cleaned = section.replace(new RegExp(`^${headerWord}\\s+\\d+\\s*`, "im"), "").trim();
      if (!cleaned.match(new RegExp(fields[0] + ":", "i"))) continue;
      const item = {};
      for (const field of fields) {
        const m = cleaned.match(new RegExp(field + ":\\s*(.+?)(?=\\n[A-Z_]+:|$)", "is"));
        if (m) item[field.toLowerCase().replace(/_/g,"")] = m[1].trim();
      }
      if (Object.keys(item).length >= 2) items.push({ ...item, id: `${headerWord}_${items.length}_${Date.now()}` });
    }
    return { items, ...extra };
  }

  const copyText = (id, text) => {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        setCopiedId(id);
        setTimeout(() => setCopiedId(null), 1800);
      }).catch(()=>{});
    }
  };

  // Generate proposal PDF with user-filled fields
  const downloadProposalPDF = () => {
    if (!toolkit?.proposal) return;
    const p = toolkit.proposal;
    const cd = proposalData;
    const fill = (s) => (s||"")
      .replace(/\[CLIENT_NAME\]|\[CLIENT\]/gi, cd.clientName || "[Client Name]")
      .replace(/\[PROJECT_NAME\]|\[PROJECT\]/gi, cd.projectName || "[Project]")
      .replace(/\[PRICE\]|\[INVESTMENT\]/gi, cd.price ? `$${cd.price}` : "[Investment]")
      .replace(/\[TIMELINE\]/gi, cd.timeline || "[Timeline]");

    const html = `<!DOCTYPE html><html><head><title>Proposal — ${cd.clientName || biz}</title>
<style>
  @page { size: letter; margin: 0.75in; }
  body { font-family: 'Helvetica',sans-serif; color:#1a1a1a; line-height:1.65; max-width:7in; margin:0 auto; padding:0; }
  .cover { text-align:center; padding:3in 0 1.5in; page-break-after:always; }
  .cover h1 { font-family:Georgia,serif; font-size:36pt; font-weight:900; color:${accent}; margin:0 0 14pt; line-height:1.05; }
  .cover .sub { font-size:13pt; color:#666; font-style:italic; margin-bottom:32pt; }
  .cover .meta { font-size:11pt; color:#999; }
  .cover .by { margin-top:80pt; font-size:9pt; color:#bbb; letter-spacing:2pt; text-transform:uppercase; }
  h2 { font-family:Georgia,serif; font-size:18pt; font-weight:900; color:${accent}; margin:32pt 0 10pt; padding-bottom:5pt; border-bottom:2pt solid ${accent}; }
  p { margin:0 0 12pt; font-size:11pt; }
  ul { margin:0 0 12pt; padding-left:20pt; }
  li { font-size:11pt; margin-bottom:6pt; }
  .ps { margin-top:36pt; padding:16pt 18pt; background:#fafafa; border-left:3pt solid ${accent}; font-style:italic; font-size:11pt; color:#444; }
  .footer { margin-top:48pt; padding-top:18pt; border-top:1pt solid #ddd; text-align:center; font-size:9pt; color:#999; }
</style></head>
<body>
  <div class="cover">
    <div style="font-size:11pt; color:${accent}; letter-spacing:3pt; text-transform:uppercase; margin-bottom:24pt;">Proposal</div>
    <h1>${fill(cd.projectName) || "Project Proposal"}</h1>
    <div class="sub">${fill(p.coverLine)}</div>
    <div class="meta">Prepared for ${cd.clientName || "[Client Name]"}<br/>By ${biz}<br/>${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
    <div class="by">Crafted with Founder's Cabinet</div>
  </div>

              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── DAILY OPERATOR — The Habit-Forming Coach ──────────────────────────────
// First thing user sees every day. Generates ONE specific action, week's leverage point, reality check.

function DailyOperator({ profile, brandKit, goals, wins, convos, revLog, finData, onNavigate, addWin }) {
  const [todayPlan, setTodayPlan] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [streak, setStreak] = useState(0);
  const [lastVisit, setLastVisit] = useState(null);
  const [showRealityCheck, setShowRealityCheck] = useState(false);
  const [realityQuestion, setRealityQuestion] = useState("");
  const [realityAnswer, setRealityAnswer] = useState("");
  const [realityLoading, setRealityLoading] = useState(false);
  const [completedToday, setCompletedToday] = useState(false);

  const today = new Date().toDateString();

  // Load saved state
  useEffect(() => {
    (async () => {
      const saved = await sg("fc_daily_plan");
      const streakData = await sg("fc_streak");

      if (streakData) {
        setStreak(streakData.count || 0);
        setLastVisit(streakData.lastDate);

        // Update streak: if last visit was yesterday, +1. If today, no change. If older, reset to 1.
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (streakData.lastDate === today) {
          // already counted
        } else if (streakData.lastDate === yesterday) {
          const newCount = (streakData.count || 0) + 1;
          setStreak(newCount);
          ss("fc_streak", { count: newCount, lastDate: today });
        } else {
          // Streak broken or first time
          setStreak(1);
          ss("fc_streak", { count: 1, lastDate: today });
        }
      } else {
        setStreak(1);
        ss("fc_streak", { count: 1, lastDate: today });
      }

      // If today's plan exists and is from today, use it
      if (saved && saved.date === today) {
        setTodayPlan(saved);
        setCompletedToday(saved.completed || false);
      } else {
        // Auto-generate today's plan
        generateTodayPlan();
      }
    })();
  }, []);

  const biz   = profile?.businessName || profile?.ideaDescription?.slice(0,80) || "your business";
  const ind   = profile?.industry?.split("(")[0]?.trim() || "your industry";
  const loc   = `${profile?.city || ""}, ${profile?.region || ""}`.replace(/^[, ]+|[, ]+$/g,"") || "your area";
  const cust  = (profile?.targetCustomer || []).join("; ");
  const stage = profile?.stage || "early";
  const recentWins = (wins || []).slice(0, 3).map(w => w.title).join("; ");
  const totRev    = (revLog || []).reduce((s,r) => s + Number(r.amount||0), 0);
  const goalCount = (goals || []).filter(g => g.target > 0 && g.current < g.target).length;
  const advisorChats = Object.values(convos || {}).reduce((s, msgs) => s + (msgs||[]).filter(m => m.role === "user").length, 0);

  const generateTodayPlan = async () => {
    setLoading(true);
    setError(null);

    const dayName = new Date().toLocaleDateString("en-US", { weekday: "long" });
    const monthDay = new Date().toLocaleDateString("en-US", { month: "long", day: "numeric" });
    const ctx = `Business: ${biz}
Industry: ${ind}
Location: ${loc}
Stage: ${stage}
Target Customer: ${cust}
Active Goals: ${goalCount}
Recent Wins: ${recentWins || "None yet"}
Total Revenue Logged: $${totRev}
Advisor Conversations: ${advisorChats}
Today: ${dayName}, ${monthDay}
Streak: Day ${streak} of showing up`;

    try {
      const raw = await callClaude(
        "You are a sharp, direct business coach. You don't waste their time. You give ONE specific action, ONE leverage point, and brutal honest insight. Output ONLY in the requested format. HONESTY: never invent specific market stats. If you'd need a fake citation, skip the number. Use plain language — grade-9 reading level. Short sentences. One bold insight, not five.",
        [{ role:"user", content:`${ctx}

Generate this founder's daily plan. Be SPECIFIC to ${biz} — not generic. Reference actual details. If they're early stage with no revenue, focus on getting first customer. If they have revenue, focus on the next leverage point.

Return ONLY this exact format:

ONE_THING: [The single most important action they should take TODAY. Maximum 15 words. Specific and concrete — not "work on marketing" but "Email 5 wedding venues with this exact pitch: [pitch]"]
FIRST_STEP: [The very first 5-minute step to start that one thing right now. Action they could literally do in the next 5 minutes.]
WHY_TODAY: [One sentence on why TODAY is the day for this — tie to ${dayName} or current context.]
WEEKS_LEVERAGE: [The ONE moment or decision this week that has 10x the impact of everything else. 1-2 sentences.]
WHATS_WORKING: [Based on their activity, what's gaining traction. Be honest — if nothing yet, say "You haven't built enough data yet — focus on consistency this week."]
WHATS_NOT: [Brutal honest call-out. What they're NOT doing that they should be. Or what they're doing that's wasting time. 1-2 sentences.]
ENERGY: [One word describing the energy needed today: "Hustle" | "Strategy" | "Patience" | "Boldness" | "Discipline" | "Momentum"]` }],
        false, 1, 800
      );

      const grab = (label) => raw.match(new RegExp(label + ":\\s*(.+?)(?=\\n[A-Z_]+:|$)", "is"))?.[1]?.trim() || "";
      const plan = {
        date: today,
        oneThing: grab("ONE_THING"),
        firstStep: grab("FIRST_STEP"),
        whyToday: grab("WHY_TODAY"),
        weeksLeverage: grab("WEEKS_LEVERAGE"),
        whatsWorking: grab("WHATS_WORKING"),
        whatsNot: grab("WHATS_NOT"),
        energy: grab("ENERGY") || "Momentum",
        completed: false,
      };
      setTodayPlan(plan);
      ss("fc_daily_plan", plan);
    } catch(e) {
      console.error("Daily plan error:", e);
      setError("Couldn't load today's plan. Tap to retry.");
    }
    setLoading(false);
  };

  const markComplete = () => {
    if (!todayPlan) return;
    const updated = { ...todayPlan, completed: true };
    setTodayPlan(updated);
    setCompletedToday(true);
    ss("fc_daily_plan", updated);
    addWin?.({ emoji:"⚡", title:`Did today's One Thing: ${todayPlan.oneThing.slice(0,50)}...`, date: new Date().toLocaleDateString() });
  };

  const askRealityCheck = async () => {
    if (!realityQuestion.trim()) return;
    setRealityLoading(true);
    setRealityAnswer("");
    try {
      const ctx = `Business: ${biz}, Industry: ${ind}, Location: ${loc}, Stage: ${stage}, Customer: ${cust}, Revenue: $${totRev}, Recent wins: ${recentWins || "none"}`;
      const ans = await callClaude(
        "You are a brutally honest business coach. Tell the truth — even if uncomfortable. No fluff, no encouragement-for-encouragement's-sake. If they're making a mistake, say so. If they're on track, say so. 100-150 words max.",
        [{ role:"user", content:`Founder context: ${ctx}\n\nThey ask: "${realityQuestion}"\n\nGive them the brutal honest answer with one specific action.` }],
        false, 1, 500
      );
      setRealityAnswer(ans);
    } catch(e) {
      console.error("Reality check error:", e);
      setRealityAnswer("Couldn't process that. Try again in a moment.");
    }
    setRealityLoading(false);
  };

  const energyColors = {
    "Hustle": "#FF6B35", "Strategy": "#A78BFA", "Patience": "#00C897",
    "Boldness": "#F4C430", "Discipline": "#3FA8E0", "Momentum": "#F472B6"
  };
  const energyColor = energyColors[todayPlan?.energy] || "#F4C430";
  const greeting = HOUR < 12 ? "Good morning" : HOUR < 17 ? "Good afternoon" : "Good evening";

  return (
    <div style={{ marginBottom: 18 }}>
      {/* Hero — Today's One Thing */}
      <div style={{ background:"linear-gradient(135deg, rgba(244,196,48,0.08), rgba(255,107,53,0.05))", border:"1px solid rgba(244,196,48,0.25)", borderRadius:18, padding:"22px 20px", marginBottom:12, position:"relative", overflow:"hidden" }}>
        {/* Streak badge — top right */}
        <div style={{ position:"absolute", top:14, right:14, display:"flex", alignItems:"center", gap:6, padding:"5px 11px", borderRadius:20, background:"rgba(244,196,48,0.12)", border:"1px solid rgba(244,196,48,0.3)" }}>
          <span style={{ fontSize:12 }}>🔥</span>
          <span style={{ fontSize:11, fontWeight:700, color:"#F4C430" }}>{streak}-day streak</span>
        </div>

        <div style={{ fontSize:9, letterSpacing:2.5, textTransform:"uppercase", color:"rgba(244,196,48,0.7)", fontWeight:600, marginBottom:8 }}>
          ⚡ {greeting}, {profile?.ownerName?.split(" ")[0] || "Founder"}
        </div>

        {loading && !todayPlan ? (
          <div style={{ padding:"20px 0", textAlign:"center" }}>
            <div style={{ display:"inline-flex", alignItems:"center", gap:10 }}>
              <span style={{ width:16, height:16, border:"2px solid rgba(244,196,48,0.2)", borderTop:"2px solid #F4C430", borderRadius:"50%", display:"inline-block", animation:"spin .7s linear infinite" }}/>
              <span style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>Building today's plan...</span>
            </div>
          </div>
        ) : error ? (
          <div>
            <div style={{ fontSize:13, color:"#FF6B6B", marginBottom:10 }}>{error}</div>
            <button onClick={generateTodayPlan} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid rgba(255,80,80,0.3)", background:"transparent", color:"#FF6B6B", fontSize:12, fontWeight:600, cursor:"pointer" }}>↻ Retry</button>
          </div>
        ) : todayPlan && (
          <>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:8, fontWeight:500, textTransform:"uppercase", letterSpacing:1.5 }}>Today's One Thing</div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(20px,4vw,26px)", fontWeight:900, color:"#fff", lineHeight:1.25, marginBottom:14, letterSpacing:"-0.01em" }}>
              {todayPlan.oneThing}
            </div>

            {todayPlan.firstStep && (
              <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:"12px 14px", marginBottom:12 }}>
                <div style={{ fontSize:9, letterSpacing:1.5, color:"rgba(0,200,151,0.85)", fontWeight:700, marginBottom:5, textTransform:"uppercase" }}>👉 Start in 5 minutes</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", lineHeight:1.55 }}>{todayPlan.firstStep}</div>
              </div>
            )}

            {todayPlan.whyToday && (
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginBottom:14, lineHeight:1.55, fontStyle:"italic" }}>{todayPlan.whyToday}</div>
            )}

            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              {!completedToday ? (
                <button onClick={markComplete} style={{ flex:"1 1 auto", padding:"12px 18px", borderRadius:11, border:"none", background:"linear-gradient(135deg,#00C897,#00A878)", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", minWidth:180 }}>
                  ✓ I did it today
                </button>
              ) : (
                <div style={{ flex:"1 1 auto", padding:"12px 18px", borderRadius:11, background:"rgba(0,200,151,0.12)", border:"1px solid rgba(0,200,151,0.3)", color:"#00C897", fontSize:13, fontWeight:700, textAlign:"center", display:"flex", alignItems:"center", justifyContent:"center", gap:8, minWidth:180 }}>
                  ✓ Done. Streak +1 tomorrow.
                </div>
              )}
              <button onClick={generateTodayPlan} disabled={loading} style={{ padding:"12px 14px", borderRadius:11, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"rgba(255,255,255,0.5)", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                {loading ? "..." : "↻"}
              </button>
              <div style={{ padding:"6px 12px", borderRadius:20, background:`${energyColor}18`, border:`1px solid ${energyColor}40`, color:energyColor, fontSize:10, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>
                {todayPlan.energy} mode
              </div>
            </div>
          </>
        )}
      </div>

      {/* Week's Leverage Point */}
      {todayPlan?.weeksLeverage && (
        <div style={{ background:"rgba(167,139,250,0.04)", border:"1px solid rgba(167,139,250,0.18)", borderRadius:14, padding:"14px 18px", marginBottom:10 }}>
          <div style={{ fontSize:9, letterSpacing:2, color:"rgba(167,139,250,0.85)", fontWeight:700, marginBottom:6, textTransform:"uppercase" }}>🎯 This week's moment that matters</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.8)", lineHeight:1.6, fontWeight:300 }}>{todayPlan.weeksLeverage}</div>
        </div>
      )}

      {/* What's Working / What's Not — side by side */}
      {todayPlan && (todayPlan.whatsWorking || todayPlan.whatsNot) && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
          {todayPlan.whatsWorking && (
            <div style={{ background:"rgba(0,200,151,0.04)", border:"1px solid rgba(0,200,151,0.18)", borderRadius:12, padding:"12px 14px" }}>
              <div style={{ fontSize:9, letterSpacing:1.5, color:"rgba(0,200,151,0.85)", fontWeight:700, marginBottom:6, textTransform:"uppercase" }}>✓ What's working</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", lineHeight:1.55, fontWeight:300 }}>{todayPlan.whatsWorking}</div>
            </div>
          )}
          {todayPlan.whatsNot && (
            <div style={{ background:"rgba(255,107,53,0.04)", border:"1px solid rgba(255,107,53,0.2)", borderRadius:12, padding:"12px 14px" }}>
              <div style={{ fontSize:9, letterSpacing:1.5, color:"rgba(255,107,53,0.85)", fontWeight:700, marginBottom:6, textTransform:"uppercase" }}>⚠️ Stop or start</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", lineHeight:1.55, fontWeight:300 }}>{todayPlan.whatsNot}</div>
            </div>
          )}
        </div>
      )}

      {/* Reality Check — collapsible */}
      <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, marginBottom:10 }}>
        <button onClick={() => setShowRealityCheck(!showRealityCheck)} style={{ width:"100%", padding:"13px 16px", background:"transparent", border:"none", color:"rgba(255,255,255,0.85)", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>🪞</span>
            <span>Reality Check</span>
            <span style={{ fontSize:10, color:"rgba(255,255,255,0.35)", fontWeight:400 }}>· Stuck? Get the brutal truth.</span>
          </span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,0.4)", transform:showRealityCheck?"rotate(90deg)":"none", transition:"transform .2s" }}>›</span>
        </button>
        {showRealityCheck && (
          <div style={{ padding:"4px 16px 16px" }}>
            <textarea
              value={realityQuestion}
              onChange={e=>setRealityQuestion(e.target.value)}
              placeholder="What's stuck? Where are you confused? What decision are you avoiding?"
              rows={2}
              style={{ ...SI, width:"100%", boxSizing:"border-box", fontSize:13, padding:"10px 12px", lineHeight:1.55, resize:"none", marginBottom:10 }}
            />
            <button
              onClick={askRealityCheck}
              disabled={!realityQuestion.trim() || realityLoading}
              style={{ width:"100%", padding:"11px", borderRadius:10, border:"none", background:realityQuestion.trim() && !realityLoading ? "linear-gradient(135deg,#F4C430,#FF6B35)" : "rgba(255,255,255,0.06)", color:realityQuestion.trim() && !realityLoading ? "#060910" : "rgba(255,255,255,0.3)", fontSize:13, fontWeight:700, cursor:realityQuestion.trim() && !realityLoading ? "pointer" : "not-allowed" }}>
              {realityLoading ? "Thinking..." : "Give me the truth →"}
            </button>
            {realityAnswer && (
              <div style={{ marginTop:14, padding:"14px 16px", background:"rgba(244,196,48,0.05)", border:"1px solid rgba(244,196,48,0.2)", borderRadius:10, fontSize:13, color:"rgba(255,255,255,0.85)", lineHeight:1.7, whiteSpace:"pre-wrap" }}>
                {realityAnswer}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
